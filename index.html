<html>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0a0a0a;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            -webkit-touch-callout: none;
            -webkit-overflow-scrolling: touch;
            touch-action: manipulation;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 30px;
            border-bottom: 1px solid #222;
            background-color: #0a0a0a;
            width: 100%;
            margin: 0 auto;
        }

        /* Mobile header optimization */
        @media (max-width: 599px) {
            .header {
                padding: 12px 16px;
                width: 100%;
            }
            .logo {
                font-size: 20px;
            }
        }

        .logo {
            font-size: 28.8px;
            font-weight: 700;
            letter-spacing: -0.5px;
            -webkit-text-stroke: 1px white;
        }

        .wifi-info {
            display: none;
            text-align: center;
            font-size: 14px;
            color: #888;
        }

        .wifi-info.connected {
            display: block;
        }

        .wifi-name {
            font-size: 16px;
            color: #fff;
            margin-top: 4px;
        }

        .container {
            display: flex;
            height: calc(100vh - 80px);
            gap: 0px;
            padding: 30px;
            width: 100%;
            margin: 0 auto;
            overflow: hidden;
            position: relative;
        }

        /* Mobile container padding */
        @media (max-width: 599px) {
            .container {
                padding: 8px;
                height: calc(100vh - 60px);
            }
        }

        .grid-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 100%;
            width: 100%;
            padding: 0 8px;
            min-height: 0;
            overflow: hidden;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(1, 1fr);
            gap: 40px 0px;
            flex: 1;
            overflow-y: scroll;
            overflow-x: hidden;
            padding-right: 0px;
            -webkit-overflow-scrolling: touch;
            opacity: 1;
            transition: opacity 0.3s ease;
        }

        .grid.loading {
            opacity: 0.5;
        }

        /* Small screens (375px - phones) */
        @media (min-width: 320px) and (max-width: 599px) {
            .grid {
                grid-template-columns: repeat(1, 1fr);
                gap: 120px 0px;
                padding-right: 0px;
            }
            .grid-wrapper {
                max-width: 100%;
                padding: 0;
            }
            .grid-box {
                min-height: 220px;
                padding: 4px;
                margin-bottom: 40px;
            }
        }

        /* Tablet size optimization (600px+) - 2 columns */
        @media (min-width: 600px) {
            .grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 80px 20px;
            }
            .grid-wrapper {
                max-width: 95vw;
                padding: 0 10px;
            }
        }

        /* Desktop size optimization (1200px+) - 4 columns */
        @media (min-width: 1200px) {
            .grid {
                grid-template-columns: repeat(4, 1fr);
                gap: 175px 50px;
            }
            .grid-wrapper {
                max-width: 100%;
                padding: 0;
            }
        }

        .grid-box {
            aspect-ratio: 1;
            background-color: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: #fff;
            flex-direction: column;
            padding: 8px;
            overflow: hidden;
            position: relative;
            min-height: 250px;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
        }

        .grid-box:hover {
            background-color: #222;
            border-color: #444;

            left: 8px;
            font-size: 10px;
            font-weight: 700;
            color: #ec4899;
            letter-spacing: 0.5px;
            text-shadow: 0 0 4px rgba(236, 72, 153, 0.5);
        }

        .grid-box.badge-balanced.badge-new::after {
            content: 'NEW';
            position: absolute;
            top: 4px;
            right: 8px;
            font-size: 10px;
            font-weight: 700;
            color: #60a5fa;
            letter-spacing: 1px;
            text-shadow: 0 0 4px rgba(96, 165, 250, 0.5);
        }

        /* BALANCED + MIXED: split badge */
        .grid-box.badge-balanced.badge-media-content {
            border-image: linear-gradient(to right, #ec4899 0%, #ec4899 50%, #06b6d4 50%, #06b6d4 100%) 1;
        }

        .grid-box.badge-balanced.badge-media-content::before {
            content: '⚖️ BALANCED';
            position: absolute;
            top: 4px;
            left: 8px;
            font-size: 10px;
            font-weight: 700;
            color: #ec4899;
            letter-spacing: 0.5px;
            text-shadow: 0 0 4px rgba(236, 72, 153, 0.5);
        }

        .grid-box.badge-balanced.badge-media-content::after {
            content: '📝 MIXED CONTENT';
            position: absolute;
            top: 4px;
            right: 8px;
            font-size: 10px;
            font-weight: 700;
            color: #06b6d4;
            letter-spacing: 0.5px;
            text-shadow: 0 0 4px rgba(6, 182, 212, 0.5);
        }

        /* SPOTLIGHT badge - half badge on right side for rotating unpopular posts */
        .grid-box.badge-spotlight {
            border-top: 2px solid #ec4899;
            position: relative;
            box-shadow: 0 0 15px rgba(236, 72, 153, 0.4);
        }

        .grid-box.badge-spotlight::before {
            content: '💥 SPOTLIGHT';
            position: absolute;
            top: 4px;
            right: 8px;
            font-size: 10px;
            font-weight: 700;
            color: #ec4899;
            letter-spacing: 0.5px;
            text-shadow: 0 0 4px rgba(236, 72, 153, 0.5);
        }

        /* Combinations with SPOTLIGHT badge on right half */
        .grid-box.badge-hot.badge-spotlight {
            border-top: 2px solid transparent;
            border-image: linear-gradient(to right, #ef4444 0%, #ef4444 50%, #ec4899 50%, #ec4899 100%) 1;
        }

        .grid-box.badge-hot.badge-spotlight::before {
            content: '🔥 HOT';
            position: absolute;
            top: 4px;
            left: 8px;
            font-size: 10px;
            font-weight: 700;
            color: #ef4444;
            letter-spacing: 0.5px;
            text-shadow: 0 0 4px rgba(239, 68, 68, 0.5);
        }

        .grid-box.badge-hot.badge-spotlight::after {
            content: '💥 SPOTLIGHT';
            position: absolute;
            top: 4px;
            right: 8px;
            font-size: 10px;
            font-weight: 700;
            color: #ec4899;
            letter-spacing: 0.5px;
            text-shadow: 0 0 4px rgba(236, 72, 153, 0.5);
        }

        .grid-box.badge-new.badge-spotlight {
            border-top: 2px solid transparent;
            border-image: linear-gradient(to right, #60a5fa 0%, #60a5fa 50%, #ec4899 50%, #ec4899 100%) 1;
        }

        .grid-box.badge-new.badge-spotlight::before {
            content: 'NEW';
            position: absolute;
            top: 4px;
            left: 8px;
            font-size: 10px;
            font-weight: 700;
            color: #60a5fa;
            letter-spacing: 1px;
            text-shadow: 0 0 4px rgba(96, 165, 250, 0.5);
        }

        .grid-box.badge-new.badge-spotlight::after {
            content: '💥 SPOTLIGHT';
            position: absolute;
            top: 4px;
            right: 8px;
            font-size: 10px;
            font-weight: 700;
            color: #ec4899;
            letter-spacing: 0.5px;
            text-shadow: 0 0 4px rgba(236, 72, 153, 0.5);

        .upload-panel {
            width: 280px;
            background-color: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .upload-panel h3 {
            font-size: 16px;
            font-weight: 600;
        }

        .upload-area {
            border: 2px dashed #444;
            border-radius: 8px;
            padding: 24px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 8px;
        }

        .upload-area:hover {
            border-color: #666;

        }

            font-size: 28px;
        }

        .upload-text {

        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        @keyframes slideOut {
            from {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
            to {
                opacity: 0;
                transform: translateX(-50%) translateY(-10px);
            }
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
                box-shadow: 0 0 0 0 currentColor;
            }
            50% {
                opacity: 0.7;
                box-shadow: 0 0 0 4px rgba(255, 107, 107, 0.3);
            }
        }

        @keyframes pulseGreen {
            0%, 100% {
                opacity: 1;
                box-shadow: 0 0 0 0 currentColor;
            }
            50% {
                opacity: 0.7;
                box-shadow: 0 0 0 4px rgba(76, 175, 80, 0.3);

        .status-dot {

        .status-dot.disconnected {

        }

        .upload-buttons {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        button {

        @media (max-width: 1024px) {

        .grid::-webkit-scrollbar {

        }

        .grid::-webkit-scrollbar-thumb {

        }

        .modal {
            display: none;

</head>

<body>
    <div class="header">
        <div style="display: flex; align-items: center; gap: 12px;">
            <div id="statusDot" class="status-dot disconnected" onmousedown="startAdminLongPress()" onmouseup="stopAdminLongPress()" onmouseleave="stopAdminLongPress()" ontouchstart="startAdminLongPress()" ontouchend="stopAdminLongPress()"></div>
            <div id="onlineUserCount" style="font-size: 12px; color: #888; margin-left: 4px;">0 online</div>
        </div>
        <div class="wifi-info" id="wifiInfo">
            <div class="wifi-name" id="wifiName"></div>
        </div>
    </div>

    <div class="container">
        <div class="grid-wrapper">
            <div class="grid" id="grid">
                <!-- Grid boxes will be generated here -->
            </div>
        </div>

        <div style="display: none;" class="upload-panel">
            <!-- Hidden for display but kept for WiFi connection logic -->
            <div id="connectionInfo" style="display: none;"></div>
            <div id="testButtons" style="display: none;"></div>
            <div id="displayWiFiName" style="display: none;"></div>
        </div>
    </div>

    <input type="file" id="fileInput" accept="image/*,video/*">

    <div class="modal" id="uploadModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Add to Grid</h2>
                <button class="modal-close" onclick="closeModal()">×</button>
            </div>

            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">📸</div>
                <div class="upload-text">Drag photo, video, or post</div>
            </div>

            <textarea id="postText" placeholder="Write something..." style="
                padding: 12px;
                border: 1px solid #333;
                border-radius: 6px;
                background-color: #0a0a0a;
                color: white;
                font-family: inherit;
                font-size: 16px;
                resize: vertical;
                min-height: 80px;
                width: 100%;
            "></textarea>

            <div class="upload-buttons">
                <button onclick="uploadPost()">Post to Grid</button>
                <button class="secondary-btn" onclick="closeModal()">Cancel</button>
            </div>
        </div>
    </div>

    <div class="view-modal" id="viewModal">
        <div class="view-modal-content">
            <button class="view-modal-close" onclick="closeViewModal()">×</button>
            <div class="view-content-text" id="viewText"></div>
            
            <div style="display: flex; gap: 12px; margin-top: 24px; align-items: center; justify-content: flex-start; padding-top: 24px; border-top: 1px solid #333;" id="voteButtonsSection">
                <div style="display: flex; gap: 12px;">
                    <button id="likeBtn" onclick="toggleLike()" style="
                        padding: 8px 12px;
                        background-color: #333;
                        color: #fff;
                        border: none;
                        border-radius: 6px;
                        font-size: 12px;
                        cursor: pointer;
                        transition: all 0.2s ease;
                    " onmouseover="this.style.backgroundColor='#444'" onmouseout="this.style.backgroundColor='#333'">↑ <span id="likeCount">0</span></button>
                    
                    <button id="dislikeBtn" onclick="toggleDislike()" style="
                        padding: 8px 12px;
                        background-color: #333;
                        color: #fff;
                        border: none;
                        border-radius: 6px;
                        font-size: 12px;
                        cursor: pointer;
                        transition: all 0.2s ease;
                    " onmouseover="this.style.backgroundColor='#444'" onmouseout="this.style.backgroundColor='#333'">↓ <span id="dislikeCount">0</span></button>
                </div>
            </div>
            
            <div style="display: flex; gap: 12px; margin-top: 12px; align-items: center; justify-content: flex-start;">
                <button id="shareBtn" onclick="sharePost()" style="
                    padding: 8px 12px;
                    background-color: #333;
                    color: #fff;
                    border: none;
                    border-radius: 6px;
                    font-size: 12px;
                    cursor: pointer;
                    transition: all 0.2s ease;
                " onmouseover="this.style.backgroundColor='#444'" onmouseout="this.style.backgroundColor='#333'">🔗 Share</button>
                
                <button id="reportBtn" onclick="reportPost()" style="
                    padding: 8px 12px;
                    background-color: #333;
                    color: #fff;
                    border: none;
                    border-radius: 6px;
                    font-size: 12px;
                    cursor: pointer;
                    transition: all 0.2s ease;
                " onmouseover="this.style.backgroundColor='#444'" onmouseout="this.style.backgroundColor='#333'">🚩 Report</button>
            </div>
            
            <div id="deleteSection" style="display: none; margin-top: 24px;">
                <button onclick="deleteAndHidePost()" style="
                    width: 100%;
                    padding: 12px 16px;
                    background-color: #ff4444;
                    color: white;
                    border: none;
                    border-radius: 6px;
                    font-weight: 600;
                    font-size: 14px;
                    cursor: pointer;
                    transition: all 0.2s ease;
                " onmouseover="this.style.backgroundColor='#ff2222'" onmouseout="this.style.backgroundColor='#ff4444'">Delete Post</button>
            </div>
        </div>
    </div>

    <!-- Report Modal -->
    <div class="admin-modal" id="reportModal">
        <div class="admin-modal-content" style="max-width: 500px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 style="margin: 0;">Report Post</h2>
                <button onclick="closeReportModal()" style="background: none; border: none; color: white; font-size: 28px; cursor: pointer;">×</button>
            </div>
            
            <p style="color: #888; margin-bottom: 20px;">Why are you reporting this post?</p>
            
            <div style="display: flex; flex-direction: column; gap: 10px;">
                <button onclick="submitReport('Nudity')" style="
                    width: 100%;
                    padding: 12px 16px;
                    background-color: #333;
                    color: white;
                    border: 1px solid #555;
                    border-radius: 6px;
                    font-weight: 600;
                    cursor: pointer;
                    text-align: left;
                    transition: all 0.2s ease;
                " onmouseover="this.style.backgroundColor='#444'; this.style.borderColor='#666';" onmouseout="this.style.backgroundColor='#333'; this.style.borderColor='#555';">🔞 Nudity or Sexual Content</button>
                
                <button onclick="submitReport('Violence')" style="
                    width: 100%;
                    padding: 12px 16px;
                    background-color: #333;
                    color: white;
                    border: 1px solid #555;
                    border-radius: 6px;
                    font-weight: 600;
                    cursor: pointer;
                    text-align: left;
                    transition: all 0.2s ease;
                " onmouseover="this.style.backgroundColor='#444'; this.style.borderColor='#666';" onmouseout="this.style.backgroundColor='#333'; this.style.borderColor='#555';">⚠️ Violence or Harmful Content</button>
                
                <button onclick="submitReport('Spam')" style="
                    width: 100%;
                    padding: 12px 16px;
                    background-color: #333;
                    color: white;
                    border: 1px solid #555;
                    border-radius: 6px;
                    font-weight: 600;
                    cursor: pointer;
                    text-align: left;
                    transition: all 0.2s ease;
                " onmouseover="this.style.backgroundColor='#444'; this.style.borderColor='#666';" onmouseout="this.style.backgroundColor='#333'; this.style.borderColor='#555';">📢 Spam or Misleading</button>
                
                <button onclick="submitReport('Harassment')" style="
                    width: 100%;
                    padding: 12px 16px;
                    background-color: #333;
                    color: white;
                    border: 1px solid #555;
                    border-radius: 6px;
                    font-weight: 600;
                    cursor: pointer;
                    text-align: left;
                    transition: all 0.2s ease;
                " onmouseover="this.style.backgroundColor='#444'; this.style.borderColor='#666';" onmouseout="this.style.backgroundColor='#333'; this.style.borderColor='#555';">👿 Harassment or Hate Speech</button>
                
                <button onclick="submitReport('Other')" style="
                    width: 100%;
                    padding: 12px 16px;
                    background-color: #333;
                    color: white;
                    border: 1px solid #555;
                    border-radius: 6px;
                    font-weight: 600;
                    cursor: pointer;
                    text-align: left;
                    transition: all 0.2s ease;
                " onmouseover="this.style.backgroundColor='#444'; this.style.borderColor='#666';" onmouseout="this.style.backgroundColor='#333'; this.style.borderColor='#555';">❓ Other</button>
            </div>
            
            <button onclick="closeReportModal()" style="
                width: 100%;
                padding: 12px 16px;
                background-color: #555;
                color: white;
                border: none;
                border-radius: 6px;
                font-weight: 600;
                cursor: pointer;
                margin-top: 16px;
            ">Cancel</button>
        </div>
    </div>

    <!-- Password Modal -->
    <div class="admin-modal" id="passwordModal">
        <div class="admin-modal-content">
            <h2 style="margin-bottom: 20px;">Admin Access</h2>
            <input type="password" id="passwordInput" placeholder="Enter password" style="
                width: 100%;
                padding: 12px;
                border: 1px solid #333;
                border-radius: 6px;
                background-color: #0a0a0a;
                color: white;
                font-size: 14px;
                margin-bottom: 16px;
            " onkeypress="if(event.key==='Enter') checkPassword()">
            <div style="display: flex; gap: 12px;">
                <button onclick="checkPassword()" style="
                    flex: 1;
                    padding: 12px;
                    background-color: #4ade80;
                    color: #000;
                    border: none;
                    border-radius: 6px;
                    font-weight: 600;
                    cursor: pointer;
                ">Enter</button>
                <button onclick="closePasswordModal()" style="
                    flex: 1;
                    padding: 12px;
                    background-color: #333;
                    color: white;
                    border: none;
                    border-radius: 6px;
                    font-weight: 600;
                    cursor: pointer;
                ">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Admin Page -->
    <div class="admin-page" id="adminPage">
        <div class="admin-header">
            <h1>Moderation Dashboard</h1>
            <button onclick="closeAdminPage()" style="
                background: none;
                border: none;
                color: white;
                font-size: 28px;
                cursor: pointer;
            ">←</button>
        </div>
        <div class="admin-content">
            <h2 style="margin-bottom: 16px;">Reported Posts</h2>
            <div id="reportedPostsList" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 12px; margin-bottom: 24px;">
                <!-- Reported posts grid shown here -->

        async function loadReportedPosts() {
            try {
                const reportsRef = ref(database, 'reports');
                const snapshot = await get(reportsRef);
                
                const reportsList = document.getElementById('reportedPostsList');
                reportsList.innerHTML = '';
                selectedReportedPosts.clear();
                
                if (!snapshot.exists()) {
                    reportsList.innerHTML = '<p style="color: #888;">No reported posts</p>';
                    return;
                }
                
                const reports = snapshot.val();
                
                // Create a map: score -> array of {postId, reports}
                // This groups posts by their score at time of report
                const postsByScore = {};
                const reportsByPost = {};
                
                Object.entries(reports).forEach(([reportId, report]) => {
                    const postId = report.postId;
                    const score = report.postScore || 0;
                    
                    // Track all reports for each post
                    if (!reportsByPost[postId]) {
                        reportsByPost[postId] = [];
                    }
                    reportsByPost[postId].push(report);
                    
                    // Group by score (for position stacking)
                    if (!postsByScore[score]) {
                        postsByScore[score] = [];
                    }
                    
                    // Add post to score group (avoid duplicates)
                    if (!postsByScore[score].some(p => p.postId === postId)) {
                        postsByScore[score].push({ postId });
                    }
                });
                
                // Sort scores in descending order (highest scores first = best rankings first)
                const sortedScores = Object.keys(postsByScore)
                    .map(Number)
                    .sort((a, b) => b - a);
                
                // Display posts grouped by score (position), highest to lowest
                sortedScores.forEach(score => {
                    const postsWithThisScore = postsByScore[score];
                    
                    postsWithThisScore.forEach(({ postId }) => {
                        const post = (gridContent[currentUserId] || []).find(p => p.id === postId);
                        if (!post) return;
                        
                        const postReports = reportsByPost[postId] || [];
                        
                        const postDiv = document.createElement('div');
                        postDiv.style.cssText = 'position: relative; cursor: pointer; border: 2px solid transparent;';
                        
                        const checkbox = document.createElement('input');
                        checkbox.type = 'checkbox';
                        checkbox.style.cssText = 'position: absolute; top: 4px; left: 4px; width: 20px; height: 20px; cursor: pointer; z-index: 10;';
                        checkbox.onchange = (e) => {
                            if (e.target.checked) {
                                selectedReportedPosts.add(postId);
                                postDiv.style.borderColor = '#4ade80';
                            } else {
                                selectedReportedPosts.delete(postId);
                                postDiv.style.borderColor = 'transparent';
                            }
                        };
                        
                        const contentDiv = document.createElement('div');
                        contentDiv.style.cssText = 'width: 100%; height: 100%; background-color: #1a1a1a; border-radius: 6px; overflow: hidden;';
                        
                        // Show image if available
                        if (post.photoURL || post.imageData) {
                            const img = document.createElement('img');
                            img.src = post.photoURL || post.imageData;
                            img.style.cssText = 'width: 100%; height: 100%; object-fit: cover;';
                            contentDiv.appendChild(img);
                        } else {
                            contentDiv.innerHTML = `<div style="padding: 8px; font-size: 11px; color: #fff; overflow: hidden; text-overflow: ellipsis;">${post.content?.substring(0, 30)}</div>`;
                        }
                        
                        const reportCountDiv = document.createElement('div');
                        reportCountDiv.style.cssText = 'position: absolute; bottom: 4px; right: 4px; background-color: #f44336; color: white; padding: 2px 6px; border-radius: 3px; font-size: 10px; font-weight: 600;';
                        reportCountDiv.textContent = `${postReports.length}`;
                        
                        // Add tooltip showing report reasons and score on hover
                        const reasons = postReports.map(r => r.reason).join(', ');
                        const scoreLabel = score > 0 ? ` (Score: ${Math.round(score)})` : ' (No score)';
                        postDiv.title = `Reports: ${reasons}${scoreLabel}`;
                        
                        postDiv.appendChild(checkbox);
                        postDiv.appendChild(contentDiv);
                        postDiv.appendChild(reportCountDiv);
                        reportsList.appendChild(postDiv);
                    });
                });
                
                console.log(`✅ Loaded ${Object.keys(reportsByPost).length} reported posts grouped by position`);
                
            } catch (error) {
                console.error('Error loading reported posts:', error);
            }
        }

        async function banSelectedPosts(durationSeconds) {

        function subscribeToOnlineUserCount() {
            try {
                const onlineUsersRef = ref(database, 'onlineUsers');
                console.log('✅ Subscribed to online users');
                onlineUsersUnsubscribe = onValue(onlineUsersRef, (snapshot) => {
                    let count = 0;
                    if (snapshot.exists()) {
                        const users = snapshot.val();
                        const now = new Date().getTime();
                        
                        // Count only users who have been active in the last 5 minutes
                        Object.keys(users).forEach(uid => {
                            const lastSeen = users[uid].lastSeen || 0;
                            if (now - lastSeen < INACTIVITY_TIMEOUT) {
                                count++;
                            }
                        });
                    }
                    
                    // Store count globally for use in scoring functions
                    onlineUserCount = count;
                    
                    // Update the display
                    const countElement = document.getElementById('onlineUserCount');
                    if (countElement) {
                        countElement.textContent = count + ' online';
                    }
                });
            } catch (error) {
                console.error('Error subscribing to online users:', error);
            }
        }

            document.addEventListener('scroll', updateUserActivity, { passive: true });
            document.addEventListener('touchmove', updateUserActivity, { passive: true });
            console.log('✅ Online tracking initialized');
        }

        function startAutoRefresh() {
            // Clear existing interval if any
            if (refreshInterval) {
                clearInterval(refreshInterval);

            // Clear existing Firebase listener
            if (firebaseUnsubscribe) {
                firebaseUnsubscribe();
            }
            
            // Subscribe to real-time updates from Firebase
            if (isConnected && currentUserId) {
                console.log('Subscribing to Firebase posts for network:', currentUserId);
                subscribeToFirebasePostsWithReconnect(currentUserId);
                
                // CRITICAL MOBILE FIX: If Firebase hasn't delivered posts within 2 seconds,
                // force render the grid anyway so user sees the "Add content" button
                // This prevents frozen blank screen on slow mobile connections
                const firebaseTimeoutId = setTimeout(() => {
                    if (gridContent[currentUserId] && gridContent[currentUserId].length === 0) {
                        console.log('⚠️  Firebase slow on mobile - forcing grid render with empty state');
                        renderGrid();
                    }
                }, 2000);
                
                // Store timeout ID so we can clear it when Firebase data arrives
                window.firebaseLoadTimeoutId = firebaseTimeoutId;
            }
            
            // Set up periodic heartbeat to reconnect if connection dies (every 30 seconds)
            refreshInterval = setInterval(() => {
                if (isConnected && currentUserId && !firebaseUnsubscribe) {
                    console.log('🫀 Heartbeat: Reconnecting to Firebase listener...');
                    subscribeToFirebasePostsWithReconnect(currentUserId);
                }
            }, 30000);

        // Clean up posts older than 72 hours
        async function cleanupOldPosts() {
            if (!currentWiFiNetwork) return;
            
            const SEVENTY_TWO_HOURS = 72 * 60 * 60 * 1000; // 72 hours in milliseconds
            const now = new Date().getTime();
            
            try {
                const postsRef = ref(database, `networks/${currentWiFiNetwork}/posts`);
                const snapshot = await get(postsRef);
                
                if (!snapshot.exists()) return;
                
                const posts = snapshot.val();
                let deletedCount = 0;
                
                // Check each post's age
                Object.keys(posts).forEach(postId => {
                    const post = posts[postId];
                    const postAge = now - (post.timestamp || 0);
                    
                    // If post is older than 72 hours, delete it
                    if (postAge > SEVENTY_TWO_HOURS) {
                        console.log(`🗑️  Deleting old post (${Math.round(postAge / (60 * 60 * 1000))}h old): ${postId}`);
                        deletePostFromFirebase(currentWiFiNetwork, postId);
                        deletedCount++;
                    }
                });
                
                if (deletedCount > 0) {
                    console.log(`✅ Cleaned up ${deletedCount} posts older than 72 hours`);
                }
            } catch (error) {
                console.error('Error cleaning up old posts:', error);
            }
        }

        function calculatePostScore(post, allPosts = []) {
            const now = new Date().getTime();
            const postAge = now - (post.timestamp || 0);
            const likes = post.likes || 0;
            const dislikes = post.dislikes || 0;
            const ONE_HOUR = 60 * 60 * 1000;
            
            // Recency and fairness for tie-breaking within tiers
            const recency = Math.max(0, 100 - Math.log(Math.max(1, postAge / ONE_HOUR)) * 20);
            const fairness = Math.random() * 5;
            
            // TIER 1: TOP 3 POSITIONS (CROWNED, RUNNER-UP, PODIUM)
            if (allPosts && allPosts.length > 0) {
                // Sort posts by likes (descending), then by timestamp (newer first) for tiebreaker
                const sortedByLikes = [...allPosts]
                    .sort((a, b) => {
                        const likeDiff = (b.likes || 0) - (a.likes || 0);
                        if (likeDiff !== 0) return likeDiff;
                        // Tiebreaker: newer posts rank higher
                        return (b.timestamp || 0) - (a.timestamp || 0);
                    });
                
                // Get the top 3 posts (guaranteed to be unique)
                const topPost = sortedByLikes[0];
                const secondPost = sortedByLikes[1];
                const thirdPost = sortedByLikes[2];
                
                // Position 1: Most liked (with recency tiebreaker)
                if (topPost && post.id === topPost.id && likes > 0 && post.id !== spotlightPostId) {
                    return 1000000 + likes * 10000 + recency;
                }
                
                // Position 2: 2nd most liked (with recency tiebreaker)
                if (secondPost && post.id === secondPost.id && likes > 0) {
                    return 900000 + likes * 10000 + recency;
                }
                
                // Position 3: 3rd most liked (with recency tiebreaker)
                if (thirdPost && post.id === thirdPost.id && likes > 0) {
                    return 800000 + likes * 10000 + recency;
                }
            }
            
            // TIER 1.5: NEW POSTS (very fresh content, boost visibility)
            // New posts get high visibility just below top 3
            const newBadgeDuration = getNewBadgeDurationMs();
            if (postAge < newBadgeDuration) {
                // NEW posts score: 600000-699999 (between top 3 and liked)
                let score = 600000 + (recency * 0.60 + fairness * 0.40) * 1000;
                return Math.min(score, 699999);
            }
            
            // TIER 2: LIKED POSTS (more likes than dislikes, but not in top 3)
            if (likes > dislikes && likes > 0) {
                // LIKED posts score: 500000-599999
                let score = 500000 + (recency * 0.60 + fairness * 0.40) * 1000;
                return Math.min(score, 599999);
            }
            
            // TIER 3: NEUTRAL/NO BADGE POSTS (equal votes or very new posts)
            if (likes === dislikes || (likes === 0 && dislikes === 0)) {
                // Neutral posts score: 300000-399999
                let score = 300000 + (recency * 0.60 + fairness * 0.40) * 1000;
                return Math.min(score, 399999);
            }
            
            // TIER 4: DISLIKED POSTS (more dislikes than likes) - BOTTOM
            if (dislikes > likes) {
                // DISLIKED posts score: 100000-199999 (visible but at bottom)
                let score = 100000 + (recency * 0.60 + fairness * 0.40) * 1000;
                return Math.min(score, 199999);
            }
            
            // Default fallback (shouldn't reach here)
            return 300000 + Math.random() * 1000;
        }

                        // Media container with padding to leave room for vote badge
                        box.innerHTML = `<div style="width: 100%; height: calc(100% - 50px); background-color: #000; display: flex; align-items: center; justify-content: center; overflow: hidden;">${mediaHTML}</div><div style="position: absolute; width: 100%; height: 100%; display: flex; flex-direction: column; padding: 0; top: 0;">${voteBadge}</div>`;

        function calculateBadges(post, allPosts) {
            const badges = [];
            const now = new Date().getTime();
            const postAge = now - (post.timestamp || 0);
            const ONE_HOUR = 60 * 60 * 1000;
            const SIX_HOURS = 6 * ONE_HOUR;
            const likes = post.likes || 0;
            const dislikes = post.dislikes || 0;
            const totalVotes = likes + dislikes;
            
            // Check for MEDIA-CONTENT badge
            const hasMedia = post.photoURL || post.imageData;
            const hasContent = post.content && post.content.trim().length > 0;
            const hasMixedContent = hasMedia && hasContent;
            
            // Collect all applicable badges
            const applicableBadges = [];
            
            // NEW badge: dynamic duration based on online user count
            const newBadgeDuration = getNewBadgeDurationMs();
            if (postAge < newBadgeDuration) {
                applicableBadges.push('new');
            }
            
            // HOT badge: high engagement (likes > 8)
            if (likes > 8) {
                applicableBadges.push('hot');
            }
            
            // RISING badge: recent post (< 6 hours) with good engagement (likes > 3)
            if (postAge < SIX_HOURS && likes > 3) {
                applicableBadges.push('rising');
            }
            
            // TRENDING badge: highest engagement in all posts (ONLY for position 1 most-liked)
            // Based on net positive likes (likes - dislikes)
            const netLikes = likes - dislikes;
            const maxNetLikes = Math.max(...allPosts.map(p => (p.likes || 0) - (p.dislikes || 0)));
            if (netLikes === maxNetLikes && netLikes > 0) {
                applicableBadges.push('trending');
                applicableBadges.push('crowned'); // Most liked post gets crowned badge
            }
            
            // RUNNER-UP badge: 2nd most net positive liked post (NO TRENDING)
            if (allPosts && allPosts.length > 0) {
                const netLikesArray = [...allPosts.map(p => (p.likes || 0) - (p.dislikes || 0))].sort((a, b) => b - a);
                const topNetLikes = [...new Set(netLikesArray)].slice(0, 3);
                if (topNetLikes[1] && netLikes === topNetLikes[1] && netLikes > 0) {
                    applicableBadges.push('runner-up');
                    // NO trending badge for 2nd place
                }
                // PODIUM badge: 3rd most net positive liked post (NO TRENDING)
                if (topNetLikes[2] && netLikes === topNetLikes[2] && netLikes > 0) {
                    applicableBadges.push('podium');
                    // NO trending badge for 3rd place
                }
            }
            
            // CONTROVERSIAL badge: likes and dislikes are similar (within 20%)
            if (totalVotes > 5 && Math.abs(likes - dislikes) / Math.max(likes, dislikes, 1) < 0.3) {
                applicableBadges.push('controversial');
            }
            
            // DISLIKED badge: more dislikes than likes
            if (dislikes > likes) {
                applicableBadges.push('disliked');
                console.log(`🔴 DISLIKED badge added to post ${post.id.substring(0, 8)}...: ${likes}L / ${dislikes}D`);
            }
            
            // BALANCED badge: equal likes and dislikes (requires at least 1 vote each)
            if (likes === dislikes && likes > 0) {
                applicableBadges.push('balanced');
            }
            
            // VERIFIED badge: Admin post
            if (post.createdBy === 'admin-uid-here') {
                applicableBadges.push('verified');
            }
            
            // LIKED badge: more likes than dislikes and not one of the better badge posts
            // Only excluded by TOP TIER badges: CROWNED, RUNNER-UP, PODIUM, SPOTLIGHT, DISLIKED, TRENDING
            // LIKED can coexist with: NEW, RISING, HOT, CONTROVERSIAL, MEDIA-CONTENT
            if (likes > dislikes && 
                likes > 0 &&
                !applicableBadges.includes('crowned') && 
                !applicableBadges.includes('runner-up') && 
                !applicableBadges.includes('podium') && 
                !applicableBadges.includes('trending') && 
                !applicableBadges.includes('disliked') &&
                post.id !== spotlightPostId) {
                applicableBadges.push('liked');
                console.log(`✅ LIKED badge added to post ${post.id}: likes=${likes}, dislikes=${dislikes}`);
            }
            
            // Add all applicable badges
            badges.push(...applicableBadges);
            
            // Add MIXED badge if post has both media and content
            // Can combine with LIKED and NEW as split badges
            if (hasMixedContent) {
                badges.push('media-content');
            }
            
            // Add SPOTLIGHT badge if this is the currently spotlighted post
            if (post.id === spotlightPostId) {
                badges.push('spotlight');
            }
            
            // Debug: Log all badges for this post
            if (likes <= 1 && dislikes >= 3) {
                console.log(`📌 Post ${post.id.substring(0, 8)}... badges: [${badges.join(', ')}]`);
            }
            
            return badges;
        }

        function calculateBadge(post, allPosts) {
            const now = new Date().getTime();
            const postAge = now - (post.timestamp || 0);
            const ONE_HOUR = 60 * 60 * 1000;
            const SIX_HOURS = 6 * ONE_HOUR;
            const likes = post.likes || 0;
            const dislikes = post.dislikes || 0;
            const totalVotes = likes + dislikes;
            
            // MEDIA-CONTENT badge: post has both media AND written content
            const hasMedia = post.photoURL || post.imageData;
            const hasContent = post.content && post.content.trim().length > 0;
            if (hasMedia && hasContent) {
                return 'media-content';
            }
            
            // NEW badge: less than 1 hour old
            if (postAge < ONE_HOUR) {
                return 'new';
            }
            
            // CONTROVERSIAL badge: likes and dislikes are similar (within 20%)
            if (totalVotes > 5 && Math.abs(likes - dislikes) / Math.max(likes, dislikes, 1) < 0.3) {
                return 'controversial';
            }
            
            // DISLIKED badge: any dislikes
            if (dislikes > 0) {
                return 'disliked';
            }
            
            // HOT badge: high engagement (likes > 8)
            if (likes > 8) {
                return 'hot';
            }
            
            // RISING badge: recent post (< 6 hours) with good engagement (likes > 3)
            if (postAge < SIX_HOURS && likes > 3) {
                return 'rising';
            }
            
            // TRENDING badge: highest engagement in all posts
            const maxLikes = Math.max(...allPosts.map(p => p.likes || 0));
            if (likes === maxLikes && likes > 0) {
                return 'trending';
            }
            
            // VERIFIED badge: Admin post (if userId matches admin ID)
            // This is a placeholder - you can set an admin UID
            if (post.createdBy === 'admin-uid-here') {
                return 'verified';
            }
            
            return null;
        }

        // Smart video processing: trim to 20s max and compress intelligently
        async function processVideo(file) {
            return new Promise((resolve) => {
                const MAX_VIDEO_DURATION = 20; // seconds
                const MAX_VIDEO_SIZE = 100 * 1024 * 1024; // 100MB
                const QUALITY_LEVELS = [
                    { name: 'High', videoBitrate: 2500, audioBitrate: 128 },
                    { name: 'Medium', videoBitrate: 1500, audioBitrate: 96 },
                    { name: 'Low', videoBitrate: 800, audioBitrate: 64 },
                    { name: 'Very Low', videoBitrate: 400, audioBitrate: 32 }
                ];
                
                const video = document.createElement('video');
                video.src = URL.createObjectURL(file);
                
                video.onloadedmetadata = () => {
                    const videoDuration = Math.min(video.duration, MAX_VIDEO_DURATION);
                    console.log(`Video loaded: ${Math.ceil(video.duration)}s duration, will trim to ${Math.ceil(videoDuration)}s`);
                    
                    // Try compression at each quality level
                    let qualityIndex = 0;
                    
                    const tryCompress = () => {
                        if (qualityIndex >= QUALITY_LEVELS.length) {
                            alert('Unable to compress video enough. Please choose a shorter or smaller video.');
                            resolve(null);
                            return;
                        }
                        
                        const quality = QUALITY_LEVELS[qualityIndex];
                        console.log(`Attempting compression at ${quality.name} quality...`);
                        
                        compressVideoAtQuality(video, videoDuration, quality, (processedBlob) => {
                            if (processedBlob && processedBlob.size <= MAX_VIDEO_SIZE) {
                                console.log(`✓ Compression successful at ${quality.name} quality: ${(processedBlob.size / 1024 / 1024).toFixed(1)}MB`);
                                resolve(processedBlob);
                            } else if (processedBlob) {
                                console.log(`✗ ${quality.name} quality too large: ${(processedBlob.size / 1024 / 1024).toFixed(1)}MB, trying lower quality...`);
                                qualityIndex++;
                                tryCompress();
                            } else {
                                qualityIndex++;
                                tryCompress();
                            }
                        });
                    };
                    
                    tryCompress();
                };
                
                video.onerror = () => {
                    alert('Could not process video. Make sure it\'s a valid video file.');
                    resolve(null);
                };
            });
        }
        
        // Compress video at specific quality level
        function compressVideoAtQuality(videoElement, duration, quality, callback) {
            const canvas = document.createElement('canvas');
            const video = videoElement;
            const ctx = canvas.getContext('2d');
            
            // Use lower resolution for lower quality
            const qualityMultiplier = {
                'High': 1.0,
                'Medium': 0.8,
                'Low': 0.6,
                'Very Low': 0.4
            }[quality.name] || 0.6;
            
            canvas.width = video.videoWidth * qualityMultiplier;
            canvas.height = video.videoHeight * qualityMultiplier;
            
            const chunks = [];
            let startTime = null;
            let frameCount = 0;
            
            // MediaRecorder for re-encoding
            const stream = canvas.captureStream(30); // 30 fps
            
            // Try to get audio track if available
            if (video.currentTime === 0) {
                video.currentTime = 0;
            }
            
            const mimeType = 'video/webm;codecs=vp8,opus';
            const options = {
                mimeType: mimeType,
                videoBitsPerSecond: quality.videoBitrate * 1000
            };
            
            try {
                const mediaRecorder = new MediaRecorder(stream, options);
                
                mediaRecorder.ondataavailable = (e) => {
                    chunks.push(e.data);
                };
                
                mediaRecorder.onerror = (e) => {
                    console.error('MediaRecorder error:', e.error);
                    callback(null);
                };
                
                mediaRecorder.onstop = () => {
                    const blob = new Blob(chunks, { type: 'video/webm' });
                    callback(blob);
                };
                
                mediaRecorder.start();
                startTime = performance.now();
                
                // Draw frames from video
                const drawFrame = () => {
                    const currentTime = (performance.now() - startTime) / 1000;
                    
                    if (currentTime >= duration) {
                        mediaRecorder.stop();
                        return;
                    }
                    
                    video.currentTime = currentTime;
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    frameCount++;
                    
                    requestAnimationFrame(drawFrame);
                };
                
                drawFrame();
            } catch (e) {
                console.error('MediaRecorder not supported:', e);
                callback(null);
            }
        }

            'n***a', 'n***er', 'f*g', 'f*gg', 'k*ke', 'kike', 'ch*nk', 'chink', 'sp*c', 'spic',
            'c**n', 'c*ck', 'wh*re', 'whore', 'sl*t', 'slut', 'b*tch', 'b**tch', 'h*e', 'ass',

        function checkContentForInappropriate(text) {
            if (!text) return false;
            
            const lowerText = text.toLowerCase();
            
            // Check for blocked words (with some flexibility for variations)
            for (let word of BLOCKED_WORDS) {
                // Create regex that matches the word with possible character replacements
                const pattern = word.replace(/\*/g, '.?');
                const regex = new RegExp(`\\b${pattern}\\b`, 'gi');
                
                if (regex.test(lowerText)) {
                    console.log('⚠️ Inappropriate content detected:', word);
                    return true;
                }
            }
            
            // Check for excessive repeated characters (spam pattern)
            if (/(.)\1{10,}/.test(lowerText)) {
                console.log('⚠️ Spam pattern detected: excessive character repetition');
                return true;
            }
            
            return false;
        }

                submitButton.disabled = true;
                submitButton.style.opacity = '0.5';
                submitButton.style.cursor = 'not-allowed';
            }

            // Pass File object directly to completeUpload (Firebase will handle it)
            // selectedFile is already a File object from the input
            completeUpload(boxIndex, selectedFile);
        }

        async function completeUpload(boxIndex, imageFile) {
            const postText = document.getElementById('postText').value;
            const postId = `post_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`;
            
            try {
                console.log('=== Starting post creation ===');
                console.log('Network ID (currentUserId):', currentUserId);
                console.log('Network ID type:', typeof currentUserId);
                console.log('Network ID length:', currentUserId ? currentUserId.length : 0);
                console.log('Is connected:', isConnected);
                console.log('Post ID:', postId);
                console.log('Has photo:', !!imageFile);
                
                // VALIDATION: Check if we have a valid network ID
                if (!currentUserId || currentUserId.trim() === '') {
                    throw new Error('No WiFi network detected! currentUserId is empty or undefined.');
                }
                
                let photoURL = null;

                // Upload photo to Firebase Storage if provided
                if (imageFile) {
                    console.log('Uploading photo to Firebase Storage...');
                    try {
                        photoURL = await uploadPhotoToFirebase(currentUserId, postId, imageFile);
                        console.log('Photo upload complete. URL:', photoURL);
                    } catch (photoError) {
                        console.error('Photo upload FAILED:', photoError);
                        alert('Photo upload failed: ' + photoError.message);
                        throw photoError;
                    }
                }

                // Create post data object
                const postData = {
                    id: postId,
                    networkId: currentUserId,
                    content: postText,
                    photoURL: photoURL,
                    mediaType: selectedMediaType, // Track if 'video' or 'image'
                    timestamp: new Date().getTime(),
                    likes: 0,
                    dislikes: 0,
                    isUserPost: true
                };

                console.log('Post data prepared:', postData);

                // Save post to Firebase Realtime Database ONLY
                console.log('🔥 ABOUT TO SAVE POST TO FIREBASE');
                console.log('  currentUserId:', currentUserId);
                console.log('  currentWiFiNetwork:', currentWiFiNetwork);
                console.log('  postId:', postId);
                await savePostToFirebase(currentWiFiNetwork, postId, postData);

                // DO NOT update local grid - let Firebase listener handle it
                // The listener will fire when post appears in Firebase
                if (!userPostBoxes.includes(boxIndex)) {
                    userPostBoxes.push(boxIndex);
                }

                // Close modal and show notification
                closeModal();
                showNotification('Post published successfully!');
                console.log('=== Post creation complete - waiting for Firebase listener ===');
                
                // Reset zoom after posting
                resetViewportZoom();
                
            } catch (error) {
                console.error('=== Failed to upload post ===', error);
                console.error('Error stack:', error.stack);
                alert('Failed to publish post: ' + error.message);
                // Reset zoom on error too
                resetViewportZoom();
            } finally {
                // Always reset the posting flag and media type
                isPostingInProgress = false;
                selectedMediaType = null;
                
                // Re-enable the submit button
                const submitButton = document.querySelector('#uploadModal button[onclick="uploadPost()"]');
                if (submitButton) {
                    submitButton.disabled = false;
                    submitButton.style.opacity = '1';
                    submitButton.style.cursor = 'pointer';
                }
            }
        }

        // Auto-initialize on page load
        document.addEventListener('DOMContentLoaded', () => {
            console.log('🚀 FEDEX v1.0.3 - Page loaded, initializing WiFi grid...');
            console.log('BUILD INFO: Mobile optimizations, LIKED badge smart display, video autoplay support');
            initializeGrid();
            checkWiFiOnLoad();
        });
        // Also try to connect immediately in case DOMContentLoaded already fired
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', checkWiFiOnLoad);
        } else {
            setTimeout(checkWiFiOnLoad, 100);
        }

        // Vote on post from grid
        function voteOnPost(postId, voteType) {
            if (!isConnected) {
                alert('Please connect to WiFi first');
                return;
            }
            
            const post = gridContent[currentUserId].find(p => p.id === postId);
            if (!post) return;
            
            const voteKey = `${currentUserId}_${postId}`;
            const currentVote = userVotes[voteKey];
            let newLikes = post.likes || 0;
            let newDislikes = post.dislikes || 0;
            
            if (voteType === 'like') {
                if (currentVote === 'like') {
                    // User already liked - do not allow vote removal, just return
                    return;
                } else if (currentVote === 'dislike') {
                    // Change from dislike to like
                    newDislikes--;
                    newLikes++;
                    userVotes[voteKey] = 'like';
                } else {
                    // Add like (first vote on this post)
                    newLikes++;
                    userVotes[voteKey] = 'like';
                }
            } else if (voteType === 'dislike') {
                if (currentVote === 'dislike') {
                    // User already disliked - do not allow vote removal, just return
                    return;
                } else if (currentVote === 'like') {
                    // Change from like to dislike
                    newLikes--;
                    newDislikes++;
                    userVotes[voteKey] = 'dislike';
                } else {
                    // Add dislike (first vote on this post)
                    newDislikes++;
                    userVotes[voteKey] = 'dislike';
                }
            }
            
            // Update Firebase with vote counts
            updatePostVotesFirebase(currentWiFiNetwork, postId, {
                likes: newLikes,
                dislikes: newDislikes
            });
            
            // Save the user's vote preference to Firebase
            saveVoteToFirebase(currentUserId, postId, userVotes[voteKey]);
        }

        // Comments functionality
        function addComment() {
            const commentInput = document.getElementById('commentInput');
            const comment = commentInput.value.trim();
            
            if (!comment) {
                alert('Please enter a comment');
                return;
            }
            
            const commentsList = document.getElementById('commentsList');
            
            // Remove "No comments yet" message if present
            if (commentsList.textContent.includes('No comments yet')) {
                commentsList.innerHTML = '';
            }
            
            // Create comment element
            const commentEl = document.createElement('div');
            commentEl.style.cssText = `
                padding: 10px;
                margin-bottom: 8px;
                background-color: #1a1a1a;
                border-left: 3px solid #4ade80;
                border-radius: 4px;
                font-size: 13px;
                color: #fff;
                word-wrap: break-word;
                line-height: 1.4;
            `;
            commentEl.textContent = comment;
            
            // Insert at top
            commentsList.insertBefore(commentEl, commentsList.firstChild);
            
            // Scroll to top to show new comment
            commentsList.scrollTop = 0;
            
            // Clear input
            commentInput.value = '';
            commentInput.focus();
        }

        // CRITICAL: Expose functions to global scope so onclick handlers can access them
        // (module scope normally hides these from HTML onclick attributes)
        window.uploadPost = uploadPost;
        window.closeModal = closeModal;
        window.toggleLike = toggleLike;
        window.toggleDislike = toggleDislike;
        window.sharePost = sharePost;
        window.reportPost = reportPost;
        window.deleteAndHidePost = deleteAndHidePost;
        window.hidePost = hidePost;
        window.closeViewModal = closeViewModal;
        window.testDisconnectReconnect = testDisconnectReconnect;
        window.testReconnect = testReconnect;
        window.checkPassword = checkPassword;
        window.closePasswordModal = closePasswordModal;
        window.closeAdminPage = closeAdminPage;
        window.startAdminLongPress = startAdminLongPress;
        window.stopAdminLongPress = stopAdminLongPress;
        window.addComment = addComment;
        window.voteOnPost = voteOnPost;
        
        // Enable touch scrolling on the grid for mobile devices
        const grid = document.getElementById('grid');
        if (grid) {
            // Allow natural touch scrolling on the grid
            grid.addEventListener('touchmove', (e) => {
                // Don't prevent default - let the browser handle natural scrolling
            }, { passive: true });
            
            // Ensure the grid can scroll from any area
            grid.style.touchAction = 'pan-y';
        }
        
        console.log('✅ All functions exposed to global window scope');
        console.log('✅ Touch scrolling enabled for mobile');

    </script>
</html>
