<!DOCTYPE html>
<html>
<head>
    <title>WiFi Grid - Local Community</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0a0a0a;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            height: 100vh;
            overflow: hidden;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 30px;
            border-bottom: 1px solid #222;
            background-color: #0a0a0a;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .wifi-info {
            display: none;
            text-align: center;
            font-size: 14px;
            color: #888;
        }

        .wifi-info.connected {
            display: block;
        }

        .wifi-name {
            font-size: 16px;
            color: #fff;
            margin-top: 4px;
        }

        .container {
            display: flex;
            height: calc(100vh - 80px);
            gap: 30px;
            padding: 30px;
        }

        .grid-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
            flex: 1;
            overflow-y: auto;
            padding-right: 10px;
        }

        .grid-box {
            aspect-ratio: 1;
            background-color: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #666;
        }

        .grid-box:hover {
            background-color: #222;
            border-color: #444;
        }

        .grid-box.filled {
            background-color: #1a1a1a;
            border-color: #555;
        }

        .upload-panel {
            width: 280px;
            background-color: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .upload-panel h3 {
            font-size: 16px;
            font-weight: 600;
        }

        .upload-area {
            border: 2px dashed #444;
            border-radius: 8px;
            padding: 24px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 8px;
        }

        .upload-area:hover {
            border-color: #666;
            background-color: #222;
        }

        .upload-area.dragover {
            border-color: #fff;
            background-color: #2a2a2a;
        }

        .upload-icon {
            font-size: 28px;
        }

        .upload-text {
            font-size: 12px;
            color: #888;
        }

        input[type="file"] {
            display: none;
        }

        .upload-buttons {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        button {
            padding: 12px 16px;
            background-color: #fff;
            color: #000;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        button:hover {
            background-color: #f0f0f0;
        }

        .secondary-btn {
            background-color: #333;
            color: #fff;
        }

        .secondary-btn:hover {
            background-color: #444;
        }

        .wifi-connect-btn {
            background-color: #333;
            color: #fff;
            width: 100%;
        }

        .wifi-connect-btn:hover {
            background-color: #444;
        }

        @media (max-width: 1024px) {
            .container {
                flex-direction: column;
                padding: 20px;
                gap: 20px;
            }

            .upload-panel {
                width: 100%;
                order: -1;
            }
        }

        .grid::-webkit-scrollbar {
            width: 6px;
        }

        .grid::-webkit-scrollbar-track {
            background: transparent;
        }

        .grid::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 3px;
        }

        .grid::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
    </style>
</head>

<body>
    <div class="header">
        <div class="logo">Grid</div>
        <div class="wifi-info" id="wifiInfo">
            <div style="font-size: 12px; color: #666;">Connected to</div>
            <div class="wifi-name" id="wifiName"></div>
        </div>
    </div>

    <div class="container">
        <div class="grid-wrapper">
            <div class="grid" id="grid">
                <!-- Grid boxes will be generated here -->
            </div>
        </div>

        <div class="upload-panel">
            <h3>Add Content</h3>
            
            <div id="wifiStatus">
                <button class="wifi-connect-btn" onclick="connectToWiFi()">
                    Connect to WiFi
                </button>
                <p style="font-size: 12px; color: #888; margin-top: 8px; text-align: center;">
                    Connect to a WiFi network to share content
                </p>
            </div>

            <div id="uploadUI" style="display: none;">
                <div class="upload-area" id="uploadArea">
                    <div class="upload-icon">📸</div>
                    <div class="upload-text">Drag photo, video, or post</div>
                </div>

                <textarea id="postText" placeholder="Write something..." style="
                    padding: 12px;
                    border: 1px solid #333;
                    border-radius: 6px;
                    background-color: #0a0a0a;
                    color: white;
                    font-family: inherit;
                    font-size: 14px;
                    resize: vertical;
                    min-height: 80px;
                "></textarea>

                <div class="upload-buttons">
                    <button onclick="uploadPost()">Post to Grid</button>
                    <button class="secondary-btn" onclick="disconnectWiFi()">Disconnect</button>
                </div>
            </div>
        </div>
    </div>

    <input type="file" id="fileInput" accept="image/*,video/*">

    <script>
        const gridSize = 48; // 48 boxes in grid
        let isConnected = false;
        let currentWiFi = '';

        // Initialize grid
        function initializeGrid() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            for (let i = 0; i < gridSize; i++) {
                const box = document.createElement('div');
                box.className = 'grid-box';
                box.onclick = () => selectBox(i);
                grid.appendChild(box);
            }
        }

        // WiFi Connection (simulated)
        function connectToWiFi() {
            // In a real app, this would use the WiFi API
            // For now, we'll simulate with a prompt
            const wifiName = prompt('Enter WiFi Network Name:');
            if (wifiName) {
                isConnected = true;
                currentWiFi = wifiName;
                document.getElementById('wifiStatus').style.display = 'none';
                document.getElementById('uploadUI').style.display = 'flex';
                document.getElementById('wifiInfo').classList.add('connected');
                document.getElementById('wifiName').textContent = wifiName;
            }
        }

        function disconnectWiFi() {
            isConnected = false;
            currentWiFi = '';
            document.getElementById('wifiStatus').style.display = 'block';
            document.getElementById('uploadUI').style.display = 'none';
            document.getElementById('wifiInfo').classList.remove('connected');
        }

        // Upload handling
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');

        uploadArea.addEventListener('click', () => fileInput.click());

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            handleFiles(e.dataTransfer.files);
        });

        fileInput.addEventListener('change', (e) => {
            handleFiles(e.target.files);
        });

        function handleFiles(files) {
            if (files.length > 0) {
                uploadArea.innerHTML = `<div style="text-align: center;"><div class="upload-icon">✓</div><div class="upload-text">${files[0].name}</div></div>`;
            }
        }

        function selectBox(index) {
            if (!isConnected) {
                alert('Please connect to WiFi first');
                return;
            }
        }

        function uploadPost() {
            if (!isConnected) {
                alert('Please connect to WiFi first');
                return;
            }

            const postText = document.getElementById('postText').value;
            if (!postText && uploadArea.innerHTML.includes('📸')) {
                alert('Please add content');
                return;
            }

            // Add visual feedback
            const randomBox = Math.floor(Math.random() * gridSize);
            const boxes = document.querySelectorAll('.grid-box');
            boxes[randomBox].classList.add('filled');
            boxes[randomBox].innerHTML = postText ? '📝' : '📸';

            // Reset form
            document.getElementById('postText').value = '';
            uploadArea.innerHTML = '<div class="upload-icon">📸</div><div class="upload-text">Drag photo, video, or post</div>';
            fileInput.value = '';
        }

        // Initialize on load
        initializeGrid();
    </script>
</body>
</html>
