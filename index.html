<!DOCTYPE html>
<html>
<head>
    <title>WiFi Grid - Local Community</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0a0a0a;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            -webkit-overflow-scrolling: touch;
            touch-action: manipulation;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 30px;
            border-bottom: 1px solid #222;
            background-color: #0a0a0a;
            width: 90%;
            margin: 0 auto;
        }

        .logo {
            font-size: 28.8px;
            font-weight: 700;
            letter-spacing: -0.5px;
            -webkit-text-stroke: 1px white;
        }

        .wifi-info {
            display: none;
            text-align: center;
            font-size: 14px;
            color: #888;
        }

        .wifi-info.connected {
            display: block;
        }

        .wifi-name {
            font-size: 16px;
            color: #fff;
            margin-top: 4px;
        }

        .container {
            display: flex;
            height: calc(100vh - 80px);
            gap: 0px;
            padding: 30px;
            width: 100%;
            margin: 0 auto;
        }

        .grid-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 600px;
        }

        .grid {
            display: none;
            grid-template-columns: repeat(1, 1fr);
            gap: 175px 0px;
            flex: 1;
            overflow-y: scroll;
            overflow-x: hidden;
            padding-right: 0px;
            -webkit-overflow-scrolling: touch;
            scrollbar-gutter: stable;
        }

        /* Tablet size optimization (600px+) - 2 columns */
        @media (min-width: 600px) {
            .grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 175px 50px;
            }
            .grid-wrapper {
                max-width: 800px;
            }
        }

        /* Desktop size optimization (1200px+) - 4 columns */
        @media (min-width: 1200px) {
            .grid {
                grid-template-columns: repeat(4, 1fr);
                gap: 175px 50px;
            }
            .grid-wrapper {
                max-width: 100%;
            }
        }

        .grid-box {
            aspect-ratio: 1;
            background-color: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: #fff;
            flex-direction: column;
            padding: 8px;
            overflow: hidden;
            position: relative;
            min-height: 250px;
        }

        .grid-box:hover {
            background-color: #222;
            border-color: #444;
        }

        .grid-box.filled {
            background-color: #1a1a1a;
            border-color: #555;
        }

        .upload-panel {
            width: 280px;
            background-color: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .upload-panel h3 {
            font-size: 16px;
            font-weight: 600;
        }

        .upload-area {
            border: 2px dashed #444;
            border-radius: 8px;
            padding: 24px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 8px;
        }

        .upload-area:hover {
            border-color: #666;
            background-color: #222;
        }

        .upload-area.dragover {
            border-color: #fff;
            background-color: #2a2a2a;
        }

        .upload-icon {
            font-size: 28px;
        }

        .upload-text {
            font-size: 12px;
            color: #888;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        @keyframes slideOut {
            from {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
            to {
                opacity: 0;
                transform: translateX(-50%) translateY(-10px);
            }
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
                box-shadow: 0 0 0 0 currentColor;
            }
            50% {
                opacity: 0.7;
                box-shadow: 0 0 0 4px rgba(255, 107, 107, 0.3);
            }
        }

        @keyframes pulseGreen {
            0%, 100% {
                opacity: 1;
                box-shadow: 0 0 0 0 currentColor;
            }
            50% {
                opacity: 0.7;
                box-shadow: 0 0 0 4px rgba(76, 175, 80, 0.3);
            }
        }

        input[type="file"] {
            display: none;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            transition: background-color 0.3s ease;
        }

        .status-dot.connected {
            background-color: #4CAF50;
            animation: pulseGreen 2s infinite;
        }

        .status-dot.disconnected {
            background-color: #ff6b6b;
            animation: pulse 2s infinite;
        }

        .upload-buttons {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        button {
            padding: 12px 16px;
            background-color: #fff;
            color: #000;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        button:hover {
            background-color: #f0f0f0;
        }

        .secondary-btn {
            background-color: #333;
            color: #fff;
        }

        .secondary-btn:hover {
            background-color: #444;
        }

        .wifi-connect-btn {
            background-color: #333;
            color: #fff;
            width: 100%;
        }

        .wifi-connect-btn:hover {
            background-color: #444;
        }

        @media (max-width: 1024px) {
            .container {
                flex-direction: column;
                padding: 20px;
                gap: 20px;
            }

            .upload-panel {
                width: 100%;
                order: -1;
            }
        }

        .grid::-webkit-scrollbar {
            width: 6px;
        }

        .grid::-webkit-scrollbar-track {
            background: transparent;
        }

        .grid::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 3px;
        }

        .grid::-webkit-scrollbar-thumb:hover {
            background: #555;
        }

        #commentsList::-webkit-scrollbar {
            width: 6px;
        }

        #commentsList::-webkit-scrollbar-track {
            background: transparent;
        }

        #commentsList::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 3px;
        }

        #commentsList::-webkit-scrollbar-thumb:hover {
            background: #555;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background-color: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 32px;
            width: 90%;
            max-width: 400px;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .modal-header h2 {
            font-size: 18px;
        }

        .modal-close {
            background: none;
            border: none;
            color: #888;
            font-size: 24px;
            cursor: pointer;
            padding: 0;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-close:hover {
            color: #fff;
        }

        .modal .upload-area {
            margin-bottom: 16px;
        }

        .modal textarea {
            margin-bottom: 16px;
        }

        .modal .upload-buttons {
            margin-bottom: 0;
        }

        .view-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.9);
            z-index: 1001;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .view-modal.active {
            display: flex;
        }

        .view-modal-content {
            background-color: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 48px;
            width: 95%;
            max-width: 800px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .view-modal-close {
            background: none;
            border: none;
            color: #888;
            font-size: 24px;
            cursor: pointer;
            padding: 0;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-left: auto;
            margin-bottom: 24px;
        }

        .view-modal-close:hover {
            color: #fff;
        }

        .admin-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            z-index: 5000;
            align-items: center;
            justify-content: center;
        }

        .admin-modal.active {
            display: flex;
        }

        .admin-modal-content {
            background-color: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 30px;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .admin-page {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #0a0a0a;
            z-index: 5001;
            flex-direction: column;
        }

        .admin-page.active {
            display: flex;
        }

        .admin-header {
            padding: 20px 30px;
            border-bottom: 1px solid #222;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .admin-content {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
        }

        .view-content-icon {
            font-size: 80px;
            margin-bottom: 32px;
        }

        .view-content-text {
            font-size: 26px;
            line-height: 1.8;
            word-break: break-word;
            color: #fff;
        }
    </style>
</head>

<body>
    <div class="header">
        <div style="display: flex; align-items: center; gap: 12px;">
            <div class="logo" id="logoElement" onmousedown="startAdminLongPress()" onmouseup="stopAdminLongPress()" onmouseleave="stopAdminLongPress()" ontouchstart="startAdminLongPress()" ontouchend="stopAdminLongPress()">Grid</div>
            <div id="statusDot" class="status-dot disconnected"></div>
            <div id="onlineUserCount" style="font-size: 12px; color: #888; margin-left: 4px;">0 online</div>
        </div>
        <div class="wifi-info" id="wifiInfo">
            <div class="wifi-name" id="wifiName"></div>
        </div>
    </div>

    <div class="container">
        <div class="grid-wrapper">
            <div class="grid" id="grid">
                <!-- Grid boxes will be generated here -->
            </div>
        </div>

        <div style="display: none;" class="upload-panel">
            <!-- Hidden for display but kept for WiFi connection logic -->
            <div id="connectionInfo" style="display: none;"></div>
            <div id="testButtons" style="display: none;"></div>
            <div id="displayWiFiName" style="display: none;"></div>
        </div>
    </div>

    <input type="file" id="fileInput" accept="image/*,video/*">

    <div class="modal" id="uploadModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Add to Grid</h2>
                <button class="modal-close" onclick="closeModal()">×</button>
            </div>

            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">📸</div>
                <div class="upload-text">Drag photo, video, or post</div>
            </div>

            <textarea id="postText" placeholder="Write something..." style="
                padding: 12px;
                border: 1px solid #333;
                border-radius: 6px;
                background-color: #0a0a0a;
                color: white;
                font-family: inherit;
                font-size: 14px;
                resize: vertical;
                min-height: 80px;
                width: 100%;
            "></textarea>

            <div class="upload-buttons">
                <button onclick="uploadPost()">Post to Grid</button>
                <button class="secondary-btn" onclick="closeModal()">Cancel</button>
            </div>
        </div>
    </div>

    <div class="view-modal" id="viewModal">
        <div class="view-modal-content">
            <button class="view-modal-close" onclick="closeViewModal()">×</button>
            <div class="view-content-text" id="viewText"></div>
            
            <div style="display: flex; gap: 12px; margin-top: 24px; align-items: center; justify-content: space-between; padding-top: 24px; border-top: 1px solid #333;">
                <div style="display: flex; gap: 12px;">
                    <button id="likeBtn" onclick="toggleLike()" style="
                        padding: 8px 12px;
                        background-color: #333;
                        color: #fff;
                        border: none;
                        border-radius: 6px;
                        font-size: 12px;
                        cursor: pointer;
                        transition: all 0.2s ease;
                    " onmouseover="this.style.backgroundColor='#444'" onmouseout="this.style.backgroundColor='#333'">↑ <span id="likeCount">0</span></button>
                    
                    <button id="dislikeBtn" onclick="toggleDislike()" style="
                        padding: 8px 12px;
                        background-color: #333;
                        color: #fff;
                        border: none;
                        border-radius: 6px;
                        font-size: 12px;
                        cursor: pointer;
                        transition: all 0.2s ease;
                    " onmouseover="this.style.backgroundColor='#444'" onmouseout="this.style.backgroundColor='#333'">↓ <span id="dislikeCount">0</span></button>
                </div>
                
                <button id="shareBtn" onclick="sharePost()" style="
                    padding: 8px 12px;
                    background-color: #333;
                    color: #fff;
                    border: none;
                    border-radius: 6px;
                    font-size: 12px;
                    cursor: pointer;
                    transition: all 0.2s ease;
                " onmouseover="this.style.backgroundColor='#444'" onmouseout="this.style.backgroundColor='#333'">🔗 Share</button>
                
                <button id="reportBtn" onclick="reportPost()" style="
                    padding: 8px 12px;
                    background-color: #333;
                    color: #fff;
                    border: none;
                    border-radius: 6px;
                    font-size: 12px;
                    cursor: pointer;
                    transition: all 0.2s ease;
                    margin-left: 8px;
                " onmouseover="this.style.backgroundColor='#444'" onmouseout="this.style.backgroundColor='#333'">🚩 Report</button>
            </div>
            
            <div id="deleteSection" style="display: none; margin-top: 24px;">
                <button onclick="deleteAndHidePost()" style="
                    width: 100%;
                    padding: 12px 16px;
                    background-color: #ff4444;
                    color: white;
                    border: none;
                    border-radius: 6px;
                    font-weight: 600;
                    font-size: 14px;
                    cursor: pointer;
                    transition: all 0.2s ease;
                " onmouseover="this.style.backgroundColor='#ff2222'" onmouseout="this.style.backgroundColor='#ff4444'">Delete Post</button>
            </div>
        </div>
    </div>

    <!-- Report Modal -->
    <div class="admin-modal" id="reportModal">
        <div class="admin-modal-content" style="max-width: 500px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 style="margin: 0;">Report Post</h2>
                <button onclick="closeReportModal()" style="background: none; border: none; color: white; font-size: 28px; cursor: pointer;">×</button>
            </div>
            
            <p style="color: #888; margin-bottom: 20px;">Why are you reporting this post?</p>
            
            <div style="display: flex; flex-direction: column; gap: 10px;">
                <button onclick="submitReport('Nudity')" style="
                    width: 100%;
                    padding: 12px 16px;
                    background-color: #333;
                    color: white;
                    border: 1px solid #555;
                    border-radius: 6px;
                    font-weight: 600;
                    cursor: pointer;
                    text-align: left;
                    transition: all 0.2s ease;
                " onmouseover="this.style.backgroundColor='#444'; this.style.borderColor='#666';" onmouseout="this.style.backgroundColor='#333'; this.style.borderColor='#555';">🔞 Nudity or Sexual Content</button>
                
                <button onclick="submitReport('Violence')" style="
                    width: 100%;
                    padding: 12px 16px;
                    background-color: #333;
                    color: white;
                    border: 1px solid #555;
                    border-radius: 6px;
                    font-weight: 600;
                    cursor: pointer;
                    text-align: left;
                    transition: all 0.2s ease;
                " onmouseover="this.style.backgroundColor='#444'; this.style.borderColor='#666';" onmouseout="this.style.backgroundColor='#333'; this.style.borderColor='#555';">⚠️ Violence or Harmful Content</button>
                
                <button onclick="submitReport('Spam')" style="
                    width: 100%;
                    padding: 12px 16px;
                    background-color: #333;
                    color: white;
                    border: 1px solid #555;
                    border-radius: 6px;
                    font-weight: 600;
                    cursor: pointer;
                    text-align: left;
                    transition: all 0.2s ease;
                " onmouseover="this.style.backgroundColor='#444'; this.style.borderColor='#666';" onmouseout="this.style.backgroundColor='#333'; this.style.borderColor='#555';">📢 Spam or Misleading</button>
                
                <button onclick="submitReport('Harassment')" style="
                    width: 100%;
                    padding: 12px 16px;
                    background-color: #333;
                    color: white;
                    border: 1px solid #555;
                    border-radius: 6px;
                    font-weight: 600;
                    cursor: pointer;
                    text-align: left;
                    transition: all 0.2s ease;
                " onmouseover="this.style.backgroundColor='#444'; this.style.borderColor='#666';" onmouseout="this.style.backgroundColor='#333'; this.style.borderColor='#555';">👿 Harassment or Hate Speech</button>
                
                <button onclick="submitReport('Other')" style="
                    width: 100%;
                    padding: 12px 16px;
                    background-color: #333;
                    color: white;
                    border: 1px solid #555;
                    border-radius: 6px;
                    font-weight: 600;
                    cursor: pointer;
                    text-align: left;
                    transition: all 0.2s ease;
                " onmouseover="this.style.backgroundColor='#444'; this.style.borderColor='#666';" onmouseout="this.style.backgroundColor='#333'; this.style.borderColor='#555';">❓ Other</button>
            </div>
            
            <button onclick="closeReportModal()" style="
                width: 100%;
                padding: 12px 16px;
                background-color: #555;
                color: white;
                border: none;
                border-radius: 6px;
                font-weight: 600;
                cursor: pointer;
                margin-top: 16px;
            ">Cancel</button>
        </div>
    </div>

    <!-- Password Modal -->
    <div class="admin-modal" id="passwordModal">
        <div class="admin-modal-content">
            <h2 style="margin-bottom: 20px;">Admin Access</h2>
            <input type="password" id="passwordInput" placeholder="Enter password" style="
                width: 100%;
                padding: 12px;
                border: 1px solid #333;
                border-radius: 6px;
                background-color: #0a0a0a;
                color: white;
                font-size: 14px;
                margin-bottom: 16px;
            " onkeypress="if(event.key==='Enter') checkPassword()">
            <div style="display: flex; gap: 12px;">
                <button onclick="checkPassword()" style="
                    flex: 1;
                    padding: 12px;
                    background-color: #4ade80;
                    color: #000;
                    border: none;
                    border-radius: 6px;
                    font-weight: 600;
                    cursor: pointer;
                ">Enter</button>
                <button onclick="closePasswordModal()" style="
                    flex: 1;
                    padding: 12px;
                    background-color: #333;
                    color: white;
                    border: none;
                    border-radius: 6px;
                    font-weight: 600;
                    cursor: pointer;
                ">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Admin Page -->
    <div class="admin-page" id="adminPage">
        <div class="admin-header">
            <h1>Moderation Dashboard</h1>
            <button onclick="closeAdminPage()" style="
                background: none;
                border: none;
                color: white;
                font-size: 28px;
                cursor: pointer;
            ">←</button>
        </div>
        <div class="admin-content">
            <div style="display: flex; gap: 20px; margin-bottom: 24px; border-bottom: 1px solid #333; padding-bottom: 20px;">
                <button onclick="switchModTab('reported')" id="reportedTab" style="
                    padding: 8px 16px;
                    background-color: #4ade80;
                    color: #000;
                    border: none;
                    border-radius: 4px;
                    font-weight: 600;
                    cursor: pointer;
                ">Reported Posts</button>
                <button onclick="switchModTab('banned')" id="bannedTab" style="
                    padding: 8px 16px;
                    background-color: #333;
                    color: white;
                    border: none;
                    border-radius: 4px;
                    font-weight: 600;
                    cursor: pointer;
                ">Banned Users</button>
            </div>
            
            <div id="reportedPostsSection">
                <h2 style="margin-bottom: 16px;">Reported Posts</h2>
                <div id="reportedPostsList" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 12px; margin-bottom: 24px;">
                    <!-- Reported posts 50% smaller will be shown here -->
                </div>
                
                <div style="margin-top: 24px; padding: 16px; background-color: #1a1a1a; border-radius: 6px;">
                    <h3 style="margin-bottom: 12px;">Ban Duration</h3>
                    <div style="display: flex; gap: 8px; flex-wrap: wrap;">
                        <button onclick="banSelectedPosts(3600)" style="
                            padding: 8px 12px;
                            background-color: #ff9800;
                            color: white;
                            border: none;
                            border-radius: 4px;
                            cursor: pointer;
                        ">1 Hour</button>
                        <button onclick="banSelectedPosts(86400)" style="
                            padding: 8px 12px;
                            background-color: #ff5722;
                            color: white;
                            border: none;
                            border-radius: 4px;
                            cursor: pointer;
                        ">1 Day</button>
                        <button onclick="banSelectedPosts(604800)" style="
                            padding: 8px 12px;
                            background-color: #f44336;
                            color: white;
                            border: none;
                            border-radius: 4px;
                            cursor: pointer;
                        ">7 Days</button>
                        <button onclick="banSelectedPosts(2592000)" style="
                            padding: 8px 12px;
                            background-color: #c41c3b;
                            color: white;
                            border: none;
                            border-radius: 4px;
                            cursor: pointer;
                        ">30 Days</button>
                        <button onclick="banSelectedPosts(null)" style="
                            padding: 8px 12px;
                            background-color: #000;
                            color: white;
                            border: 1px solid #f44336;
                            border-radius: 4px;
                            cursor: pointer;
                        ">Permanent</button>
                    </div>
                </div>
            </div>
            
            <div id="bannedUsersSection" style="display: none;">
                <h2 style="margin-bottom: 16px;">Banned Users</h2>
                <div id="bannedUsersList" style="display: flex; flex-direction: column; gap: 12px;">
                    <!-- Banned users will be shown here -->
                </div>
            </div>

        function subscribeToFirebasePosts(networkId, callback) {
            try {
                // Listen to ALL networks globally to show posts from all users
                const networksRef = ref(database, 'networks');
                
                const unsubscribe = onValue(networksRef, (snapshot) => {
                    const allPosts = [];
                    
                    if (snapshot.exists()) {
                        const networksObj = snapshot.val();
                        
                        // Iterate through all networks (users)
                        Object.keys(networksObj).forEach(uid => {
                            const userPosts = networksObj[uid].posts;
                            if (userPosts) {
                                // Add each post with the uid it came from
                                Object.keys(userPosts).forEach(postId => {
                                    const post = userPosts[postId];
                                    allPosts.push({
                                        id: postId,
                                        ...post,
                                        networkId: uid // Ensure networkId is set to the uid
                                    });
                                });
                            }
                        });
                    }
                    
                    callback(allPosts);
                }, (error) => {
                    console.error('Firebase listener error:', error);
                });
                
                return unsubscribe;
            } catch (error) {
                console.error('Error subscribing to Firebase posts:', error);
                return () => {};
            }
        }

        function subscribeToOnlineUserCount() {
            try {
                const onlineUsersRef = ref(database, 'onlineUsers');
                console.log('✅ Subscribed to online users');
                onlineUsersUnsubscribe = onValue(onlineUsersRef, (snapshot) => {
                    let count = 0;
                    if (snapshot.exists()) {
                        const users = snapshot.val();
                        const now = new Date().getTime();
                        
                        // Count only users who have been active in the last 5 minutes
                        Object.keys(users).forEach(uid => {
                            const lastSeen = users[uid].lastSeen || 0;
                            if (now - lastSeen < INACTIVITY_TIMEOUT) {
                                count++;
                            }
                        });
                    }
                    
                    // Update the display
                    const countElement = document.getElementById('onlineUserCount');
                    if (countElement) {
                        countElement.textContent = count + ' online';
                    }
                });
            } catch (error) {
                console.error('Error subscribing to online users:', error);
            }
        }

        // Like/Dislike functions
        function toggleLike() {
            const post = gridContent[currentUserId].find(p => p.id === selectedPostId);
            if (!post) return;

            const voteKey = `${currentUserId}_${selectedPostId}`;
            const currentVote = userVotes[voteKey];
            let newLikes = post.likes || 0;
            let newDislikes = post.dislikes || 0;

            if (currentVote === 'like') {
                // Remove like
                newLikes--;
                userVotes[voteKey] = null;
            } else if (currentVote === 'dislike') {
                // Change from dislike to like
                newDislikes--;
                newLikes++;
                userVotes[voteKey] = 'like';
            } else {
                // Add like
                newLikes++;
                userVotes[voteKey] = 'like';
            }

            // Update Firebase ONLY - let listener update local state
            updatePostVotesFirebase(currentUserId, selectedPostId, {
                likes: newLikes,
                dislikes: newDislikes
            });

            updateVoteDisplay();
        }

        function toggleDislike() {
            const post = gridContent[currentUserId].find(p => p.id === selectedPostId);
            if (!post) return;

            const voteKey = `${currentUserId}_${selectedPostId}`;
            const currentVote = userVotes[voteKey];
            let newLikes = post.likes || 0;
            let newDislikes = post.dislikes || 0;

            if (currentVote === 'dislike') {
                // Remove dislike
                newDislikes--;
                userVotes[voteKey] = null;
            } else if (currentVote === 'like') {
                // Change from like to dislike
                newLikes--;
                newDislikes++;
                userVotes[voteKey] = 'dislike';
            } else {
                // Add dislike
                newDislikes++;
                userVotes[voteKey] = 'dislike';
            }

            // Update Firebase ONLY - let listener update local state
            updatePostVotesFirebase(currentUserId, selectedPostId, {
                likes: newLikes,
                dislikes: newDislikes
            });

            updateVoteDisplay();
        }

        function updateVoteDisplay() {
            const post = gridContent[currentUserId].find(p => p.id === selectedPostId);
            if (!post) return;

            document.getElementById('likeCount').textContent = post.likes || 0;
            document.getElementById('dislikeCount').textContent = post.dislikes || 0;

            const voteKey = `${currentUserId}_${selectedPostId}`;
            const currentVote = userVotes[voteKey];

            const likeBtn = document.getElementById('likeBtn');
            const dislikeBtn = document.getElementById('dislikeBtn');

            if (currentVote === 'like') {
                likeBtn.style.backgroundColor = '#4CAF50';
                dislikeBtn.style.backgroundColor = '#333';
            } else if (currentVote === 'dislike') {
                likeBtn.style.backgroundColor = '#333';

            } else {
                likeBtn.style.backgroundColor = '#333';
                dislikeBtn.style.backgroundColor = '#333';

        function renderGrid() {
            if (!isConnected) return;
            
            const grid = document.getElementById('grid');
            const hiddenForThisWiFi = hiddenPosts[currentUserId] || [];
            
            // Sort posts: current user's posts first (newest first), then other users' posts (newest first)
            const sortedPosts = [...(gridContent[currentUserId] || [])].sort((a, b) => {
                const aIsCurrentUser = a.networkId === currentUserId;
                const bIsCurrentUser = b.networkId === currentUserId;
                
                // If both are from current user or both are from others, sort by timestamp (newest first)
                if (aIsCurrentUser === bIsCurrentUser) {
                    return (b.timestamp || 0) - (a.timestamp || 0);
                }
                
                // Current user's posts come first
                return aIsCurrentUser ? -1 : 1;
            });
            
            // CRITICAL: First reset ALL boxes to empty state (up to maxGridSize)
            for (let i = 1; i < maxGridSize; i++) {
                const box = document.getElementById(`box-${i}`);
                if (box) {
                    box.innerHTML = '';
                    box.classList.remove('filled');
                    box.removeAttribute('data-post-id');
                }
            }
            
            // Render posts to grid
            let gridPosition = 1;
            sortedPosts.forEach(post => {
                if (hiddenForThisWiFi.includes(post.id)) {
                    return;
                }
                
                const box = document.getElementById(`box-${gridPosition}`);
                if (box) {
                    // Get vote counts
                    const likes = post.likes || 0;
                    const dislikes = post.dislikes || 0;
                    
                    // Check for Firebase Storage URL (photoURL) or legacy base64 (imageData)
                    if (post.photoURL || post.imageData) {

        // Smart video processing: trim to 20s max and compress intelligently
        async function processVideo(file) {
            return new Promise((resolve) => {
                const MAX_VIDEO_DURATION = 20; // seconds
                const MAX_VIDEO_SIZE = 100 * 1024 * 1024; // 100MB
                const QUALITY_LEVELS = [
                    { name: 'High', videoBitrate: 2500, audioBitrate: 128 },
                    { name: 'Medium', videoBitrate: 1500, audioBitrate: 96 },
                    { name: 'Low', videoBitrate: 800, audioBitrate: 64 },
                    { name: 'Very Low', videoBitrate: 400, audioBitrate: 32 }
                ];
                
                const video = document.createElement('video');
                video.src = URL.createObjectURL(file);
                
                video.onloadedmetadata = () => {
                    const videoDuration = Math.min(video.duration, MAX_VIDEO_DURATION);
                    console.log(`Video loaded: ${Math.ceil(video.duration)}s duration, will trim to ${Math.ceil(videoDuration)}s`);
                    
                    // Try compression at each quality level
                    let qualityIndex = 0;
                    
                    const tryCompress = () => {
                        if (qualityIndex >= QUALITY_LEVELS.length) {
                            alert('Unable to compress video enough. Please choose a shorter or smaller video.');
                            resolve(null);
                            return;
                        }
                        
                        const quality = QUALITY_LEVELS[qualityIndex];
                        console.log(`Attempting compression at ${quality.name} quality...`);
                        
                        compressVideoAtQuality(video, videoDuration, quality, (processedBlob) => {
                            if (processedBlob && processedBlob.size <= MAX_VIDEO_SIZE) {
                                console.log(`✓ Compression successful at ${quality.name} quality: ${(processedBlob.size / 1024 / 1024).toFixed(1)}MB`);
                                resolve(processedBlob);
                            } else if (processedBlob) {
                                console.log(`✗ ${quality.name} quality too large: ${(processedBlob.size / 1024 / 1024).toFixed(1)}MB, trying lower quality...`);
                                qualityIndex++;
                                tryCompress();
                            } else {
                                qualityIndex++;
                                tryCompress();
                            }
                        });
                    };
                    
                    tryCompress();
                };
                
                video.onerror = () => {
                    alert('Could not process video. Make sure it\'s a valid video file.');
                    resolve(null);
                };
            });
        }
        
        // Compress video at specific quality level
        function compressVideoAtQuality(videoElement, duration, quality, callback) {
            const canvas = document.createElement('canvas');
            const video = videoElement;
            const ctx = canvas.getContext('2d');
            
            // Use lower resolution for lower quality
            const qualityMultiplier = {
                'High': 1.0,
                'Medium': 0.8,
                'Low': 0.6,
                'Very Low': 0.4
            }[quality.name] || 0.6;
            
            canvas.width = video.videoWidth * qualityMultiplier;
            canvas.height = video.videoHeight * qualityMultiplier;
            
            const chunks = [];
            let startTime = null;
            let frameCount = 0;
            
            // MediaRecorder for re-encoding
            const stream = canvas.captureStream(30); // 30 fps
            
            // Try to get audio track if available
            if (video.currentTime === 0) {
                video.currentTime = 0;
            }
            
            const mimeType = 'video/webm;codecs=vp8,opus';
            const options = {
                mimeType: mimeType,
                videoBitsPerSecond: quality.videoBitrate * 1000
            };
            
            try {
                const mediaRecorder = new MediaRecorder(stream, options);
                
                mediaRecorder.ondataavailable = (e) => {
                    chunks.push(e.data);
                };
                
                mediaRecorder.onerror = (e) => {
                    console.error('MediaRecorder error:', e.error);
                    callback(null);
                };
                
                mediaRecorder.onstop = () => {
                    const blob = new Blob(chunks, { type: 'video/webm' });
                    callback(blob);
                };
                
                mediaRecorder.start();
                startTime = performance.now();
                
                // Draw frames from video
                const drawFrame = () => {
                    const currentTime = (performance.now() - startTime) / 1000;
                    
                    if (currentTime >= duration) {
                        mediaRecorder.stop();
                        return;
                    }
                    
                    video.currentTime = currentTime;
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    frameCount++;
                    
                    requestAnimationFrame(drawFrame);
                };
                
                drawFrame();
            } catch (e) {
                console.error('MediaRecorder not supported:', e);
                callback(null);
            }
        }

        function handleFiles(files) {
            if (!isConnected) {
                alert('WiFi connection required to upload');
                return;
            }
            if (files.length > 0) {
                const file = files[0];
                const isVideo = file.type.startsWith('video');
                const isImage = file.type.startsWith('image');
                
                // Process video before accepting
                if (isVideo) {
                    uploadArea.innerHTML = `<div style="text-align: center;"><div class="upload-icon">⏳</div><div class="upload-text">Processing video...</div></div>`;
                    
                    processVideo(file).then((processedBlob) => {
                        if (processedBlob) {
                            selectedFile = processedBlob;
                            const originalSize = (file.size / 1024 / 1024).toFixed(1);
                            const newSize = (processedBlob.size / 1024 / 1024).toFixed(1);
                            const compression = ((1 - processedBlob.size / file.size) * 100).toFixed(0);
                            uploadArea.innerHTML = `<div style="text-align: center;"><div class="upload-icon">🎬</div><div class="upload-text">Video Ready</div><div style="font-size: 10px; color: #888; margin-top: 4px;">${newSize}MB (${compression}% compressed)</div></div>`;
                            console.log(`Video processed and ready: original ${originalSize}MB → ${newSize}MB`);
                        } else {
                            selectedFile = null;
                            uploadArea.innerHTML = '<div class="upload-icon">📸</div><div class="upload-text">Drag photo, video, or post</div>';
                            fileInput.value = '';
                        }
                    });
                    return;
                }
                
                // For images - check moderation first
                if (isImage) {
                    uploadArea.innerHTML = `<div style="text-align: center;"><div class="upload-icon">🔍</div><div class="upload-text">Checking content...</div></div>`;
                    
                    const reader = new FileReader();
                    reader.onload = async (e) => {
                        // Check image moderation
                        const isSafe = await checkImageModeration(e.target.result);
                        
                        if (!isSafe) {
                            uploadArea.innerHTML = '<div class="upload-icon">⚠️</div><div class="upload-text">Content not allowed</div><div style="font-size: 11px; color: #ff6b6b; margin-top: 4px;">This image contains inappropriate content</div>';

                            return;
                        }
                        
                        // Image is safe - proceed with preview
                        selectedFile = file;
                        uploadArea.innerHTML = `<img src="${e.target.result}" style="max-width: 100%; max-height: 150px; border-radius: 6px; object-fit: contain;">`;
                    };
                    reader.readAsDataURL(file);
                } else {
                    // For other files
                    selectedFile = file;
                    const icon = '📁';
                    uploadArea.innerHTML = `<div style="text-align: center;"><div class="upload-icon">${icon}</div><div class="upload-text">${file.name.substring(0, 20)}...</div></div>`;
                }
            }
        }

        function uploadPost() {
            if (!isConnected) {
                alert('Please connect to WiFi first');
                return;
            }

            if (userPostBoxes.length >= 5) {
                alert('You can post up to 5 times per WiFi network');
                return;
            }

            const postText = document.getElementById('postText').value;
            const hasFile = selectedFile !== null;

            if (!postText && !hasFile) {
                alert('Please add content');
                return;
            }

            // Use selected box or find first empty
            let boxIndex = selectedBoxIndex;
            if (boxIndex === -1 || boxIndex === 0) {
                for (let i = 1; i < maxGridSize; i++) {
                    const box = document.getElementById(`box-${i}`);
                    if (box && !box.classList.contains('filled')) {
                        boxIndex = i;
                        break;
                    }
                }
            }

            if (boxIndex === -1) {
                alert('Grid is full');
                return;
            }

            // Pass File object directly to completeUpload (Firebase will handle it)
            // selectedFile is already a File object from the input
            completeUpload(boxIndex, selectedFile);
        }

        async function completeUpload(boxIndex, imageFile) {
            const postText = document.getElementById('postText').value;
            const postId = `post_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`;
            
            try {
                console.log('=== Starting post creation ===');
                console.log('Network ID (currentUserId):', currentUserId);
                console.log('Network ID type:', typeof currentUserId);
                console.log('Network ID length:', currentUserId ? currentUserId.length : 0);
                console.log('Is connected:', isConnected);
                console.log('Post ID:', postId);
                console.log('Has photo:', !!imageFile);
                
                // VALIDATION: Check if we have a valid network ID
                if (!currentUserId || currentUserId.trim() === '') {
                    throw new Error('No WiFi network detected! currentUserId is empty or undefined.');
                }
                
                let photoURL = null;

                // Upload photo to Firebase Storage if provided
                if (imageFile) {
                    console.log('Uploading photo to Firebase Storage...');
                    try {
                        photoURL = await uploadPhotoToFirebase(currentUserId, postId, imageFile);
                        console.log('Photo upload complete. URL:', photoURL);
                    } catch (photoError) {
                        console.error('Photo upload FAILED:', photoError);
                        alert('Photo upload failed: ' + photoError.message);
                        throw photoError;
                    }
                }

                // Create post data object
                const postData = {
                    id: postId,
                    networkId: currentUserId,
                    content: postText,
                    photoURL: photoURL,
                    timestamp: new Date().getTime(),
                    likes: 0,
                    dislikes: 0,
                    isUserPost: true
                };

                console.log('Post data prepared:', postData);

                // Save post to Firebase Realtime Database ONLY
                console.log('🔥 ABOUT TO SAVE POST TO FIREBASE');
                console.log('  currentUserId:', currentUserId);
                console.log('  postId:', postId);
                await savePostToFirebase(currentUserId, postId, postData);

                // DO NOT update local grid - let Firebase listener handle it
                // The listener will fire when post appears in Firebase
                if (!userPostBoxes.includes(boxIndex)) {
                    userPostBoxes.push(boxIndex);
                }

                // Close modal and show notification
                closeModal();
                showNotification('Post published successfully!');
                console.log('=== Post creation complete - waiting for Firebase listener ===');
                
            } catch (error) {
                console.error('=== Failed to upload post ===', error);
                console.error('Error stack:', error.stack);
                alert('Failed to publish post: ' + error.message);
            }
        }

        // Auto-initialize on page load
        document.addEventListener('DOMContentLoaded', () => {
            console.log('Page loaded, initializing WiFi grid...');
            initializeGrid();
            checkWiFiOnLoad();
        });
        // Also try to connect immediately in case DOMContentLoaded already fired
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', checkWiFiOnLoad);
        } else {
            setTimeout(checkWiFiOnLoad, 100);
        }

        // Vote on post from grid
        function voteOnPost(postId, voteType) {
            if (!isConnected) {
                alert('Please connect to WiFi first');
                return;
            }
            
            const post = gridContent[currentUserId].find(p => p.id === postId);
            if (!post) return;
            
            const voteKey = `${currentUserId}_${postId}`;
            const currentVote = userVotes[voteKey];
            let newLikes = post.likes || 0;
            let newDislikes = post.dislikes || 0;
            
            if (voteType === 'like') {
                if (currentVote === 'like') {
                    // Remove like
                    newLikes--;
                    userVotes[voteKey] = null;
                } else if (currentVote === 'dislike') {
                    // Cannot change from dislike to like - silently return
                    return;
                } else {
                    // Add like
                    newLikes++;
                    userVotes[voteKey] = 'like';
                }
            } else if (voteType === 'dislike') {
                if (currentVote === 'dislike') {
                    // Remove dislike
                    newDislikes--;
                    userVotes[voteKey] = null;
                } else if (currentVote === 'like') {
                    // Cannot change from like to dislike - silently return
                    return;
                } else {
                    // Add dislike
                    newDislikes++;
                    userVotes[voteKey] = 'dislike';
                }
            }
            
            // Update Firebase
            updatePostVotesFirebase(currentUserId, postId, {
                likes: newLikes,
                dislikes: newDislikes
            });
        }

        // Comments functionality
        function addComment() {
            const commentInput = document.getElementById('commentInput');
            const comment = commentInput.value.trim();
            
            if (!comment) {
                alert('Please enter a comment');
                return;
            }
            
            const commentsList = document.getElementById('commentsList');
            
            // Remove "No comments yet" message if present
            if (commentsList.textContent.includes('No comments yet')) {
                commentsList.innerHTML = '';
            }
            
            // Create comment element
            const commentEl = document.createElement('div');
            commentEl.style.cssText = `
                padding: 10px;
                margin-bottom: 8px;
                background-color: #1a1a1a;
                border-left: 3px solid #4ade80;
                border-radius: 4px;
                font-size: 13px;
                color: #fff;
                word-wrap: break-word;
                line-height: 1.4;
            `;
            commentEl.textContent = comment;
            
            // Insert at top
            commentsList.insertBefore(commentEl, commentsList.firstChild);
            
            // Scroll to top to show new comment
            commentsList.scrollTop = 0;
            
            // Clear input
            commentInput.value = '';
            commentInput.focus();
        }

        // CRITICAL: Expose functions to global scope so onclick handlers can access them
        // (module scope normally hides these from HTML onclick attributes)
        window.uploadPost = uploadPost;
        window.closeModal = closeModal;
        window.toggleLike = toggleLike;
        window.toggleDislike = toggleDislike;
        window.sharePost = sharePost;
        window.reportPost = reportPost;
        window.deleteAndHidePost = deleteAndHidePost;
        window.hidePost = hidePost;
        window.closeViewModal = closeViewModal;
        window.testDisconnectReconnect = testDisconnectReconnect;
        window.testReconnect = testReconnect;
        window.checkPassword = checkPassword;
        window.closePasswordModal = closePasswordModal;
        window.closeAdminPage = closeAdminPage;
        window.startAdminLongPress = startAdminLongPress;
        window.stopAdminLongPress = stopAdminLongPress;
        window.addComment = addComment;
        window.voteOnPost = voteOnPost;
        
        console.log('✅ All functions exposed to global window scope');

    </script>
</html>
