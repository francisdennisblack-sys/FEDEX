<!DOCTYPE html>
<html>
<head>
    <title>WiFi Grid - Local Community</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0a0a0a;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            height: 100vh;
            overflow: hidden;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 30px;
            border-bottom: 1px solid #222;
            background-color: #0a0a0a;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .wifi-info {
            display: none;
            text-align: center;
            font-size: 14px;
            color: #888;
        }

        .wifi-info.connected {
            display: block;
        }

        .wifi-name {
            font-size: 16px;
            color: #fff;
            margin-top: 4px;
        }

        .container {
            display: flex;
            height: calc(100vh - 80px);
            gap: 30px;
            padding: 30px;
        }

        .grid-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
            flex: 1;
            overflow-y: auto;
            padding-right: 10px;
        }

        .grid-box {
            aspect-ratio: 1;
            background-color: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: #fff;
            flex-direction: column;
            padding: 8px;
        }

        .grid-box:hover {
            background-color: #222;
            border-color: #444;
        }

        .grid-box.filled {
            background-color: #1a1a1a;
            border-color: #555;
        }

        .upload-panel {
            width: 280px;
            background-color: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .upload-panel h3 {
            font-size: 16px;
            font-weight: 600;
        }

        .upload-area {
            border: 2px dashed #444;
            border-radius: 8px;
            padding: 24px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 8px;
        }

        .upload-area:hover {
            border-color: #666;
            background-color: #222;
        }

        .upload-area.dragover {
            border-color: #fff;
            background-color: #2a2a2a;
        }

        .upload-icon {
            font-size: 28px;
        }

        .upload-text {
            font-size: 12px;
            color: #888;
        }

        input[type="file"] {
            display: none;
        }

        .upload-buttons {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        button {
            padding: 12px 16px;
            background-color: #fff;
            color: #000;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        button:hover {
            background-color: #f0f0f0;
        }

        .secondary-btn {
            background-color: #333;
            color: #fff;
        }

        .secondary-btn:hover {
            background-color: #444;
        }

        .wifi-connect-btn {
            background-color: #333;
            color: #fff;
            width: 100%;
        }

        .wifi-connect-btn:hover {
            background-color: #444;
        }

        @media (max-width: 1024px) {
            .container {
                flex-direction: column;
                padding: 20px;
                gap: 20px;
            }

            .upload-panel {
                width: 100%;
                order: -1;
            }
        }

        .grid::-webkit-scrollbar {
            width: 6px;
        }

        .grid::-webkit-scrollbar-track {
            background: transparent;
        }

        .grid::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 3px;
        }

        .grid::-webkit-scrollbar-thumb:hover {
            background: #555;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background-color: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 32px;
            width: 90%;
            max-width: 400px;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .modal-header h2 {
            font-size: 18px;
        }

        .modal-close {
            background: none;
            border: none;
            color: #888;
            font-size: 24px;
            cursor: pointer;
            padding: 0;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-close:hover {
            color: #fff;
        }

        .modal .upload-area {
            margin-bottom: 16px;
        }

        .modal textarea {
            margin-bottom: 16px;
        }

        .modal .upload-buttons {
            margin-bottom: 0;
        }

        .view-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.9);
            z-index: 1001;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .view-modal.active {
            display: flex;
        }

        .view-modal-content {
            background-color: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 48px;
            width: 95%;
            max-width: 800px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .view-modal-close {
            background: none;
            border: none;
            color: #888;
            font-size: 24px;
            cursor: pointer;
            padding: 0;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-left: auto;
            margin-bottom: 24px;
        }

        .view-modal-close:hover {
            color: #fff;
        }

        .view-content-icon {
            font-size: 80px;
            margin-bottom: 32px;
        }

        .view-content-text {
            font-size: 26px;
            line-height: 1.8;
            word-break: break-word;
            color: #fff;
        }
    </style>
</head>

<body>
    <div class="header">
        <div class="logo">Grid</div>
        <div class="wifi-info" id="wifiInfo">
            <div style="font-size: 12px; color: #666;">Connected to</div>
            <div class="wifi-name" id="wifiName"></div>
        </div>
    </div>

    <div class="container">
        <div class="grid-wrapper">
            <div class="grid" id="grid">
                <!-- Grid boxes will be generated here -->
            </div>
        </div>

        <div class="upload-panel">
            <div id="wifiStatus">
                <button class="wifi-connect-btn" onclick="connectToWiFi()">
                    Connect to WiFi
                </button>
                <p style="font-size: 12px; color: #888; margin-top: 8px; text-align: center;">
                    Connect to a WiFi network to share content
                </p>
            </div>

            <div id="connectionInfo" style="display: none;">
                <h3 style="margin-bottom: 12px;">Connected</h3>
                <div style="
                    background-color: #0a0a0a;
                    border: 1px solid #333;
                    border-radius: 6px;
                    padding: 16px;
                    text-align: center;
                ">
                    <div style="font-size: 12px; color: #666; margin-bottom: 8px;">Network</div>
                    <div id="displayWiFiName" style="font-size: 16px; font-weight: 600; margin-bottom: 16px;"></div>
                    <button class="secondary-btn" onclick="disconnectWiFi()" style="width: 100%;">Disconnect</button>
                </div>
            </div>
        </div>
    </div>

    <input type="file" id="fileInput" accept="image/*,video/*">

    <div class="modal" id="uploadModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Add to Grid</h2>
                <button class="modal-close" onclick="closeModal()">×</button>
            </div>

            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">📸</div>
                <div class="upload-text">Drag photo, video, or post</div>
            </div>

            <textarea id="postText" placeholder="Write something..." style="
                padding: 12px;
                border: 1px solid #333;
                border-radius: 6px;
                background-color: #0a0a0a;
                color: white;
                font-family: inherit;
                font-size: 14px;
                resize: vertical;
                min-height: 80px;
                width: 100%;
            "></textarea>

            <div class="upload-buttons">
                <button onclick="uploadPost()">Post to Grid</button>
                <button class="secondary-btn" onclick="closeModal()">Cancel</button>
            </div>
        </div>
    </div>

    <div class="view-modal" id="viewModal">
        <div class="view-modal-content">
            <button class="view-modal-close" onclick="closeViewModal()">×</button>
            <div class="view-content-text" id="viewText"></div>
            <div id="deleteSection" style="display: none; margin-top: 32px; padding-top: 32px; border-top: 1px solid #333;">
                <button onclick="deletePost()" style="
                    width: 100%;
                    padding: 12px 16px;
                    background-color: #ff4444;
                    color: white;
                    border: none;
                    border-radius: 6px;
                    font-weight: 600;
                    font-size: 14px;
                    cursor: pointer;
                    transition: all 0.2s ease;
                " onmouseover="this.style.backgroundColor='#ff2222'" onmouseout="this.style.backgroundColor='#ff4444'">Delete Post</button>
            </div>
        </div>
    </div>

    <script>
        const gridSize = 48;
        let isConnected = false;
        let currentWiFi = '';
        let gridContent = {};
        let selectedFile = null;
        let selectedBoxIndex = -1;
        let userPostBox = -1; // Track which box the user posted to

        // Initialize grid
        function initializeGrid() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            userPostBox = -1; // Reset user post tracking
            
            for (let i = 0; i < gridSize; i++) {
                const box = document.createElement('div');
                box.className = 'grid-box';
                box.id = `box-${i}`;
                
                // First box is always the add content button
                if (i === 0) {
                    box.innerHTML = '<div style="text-align: center; line-height: 1.2;"><div style="font-size: 32px; margin-bottom: 4px;">+</div><div style="font-size: 11px; color: #999;">Add content to grid</div></div>';
                    box.style.cursor = 'pointer';
                    box.onclick = () => {
                        if (isConnected) {
                            openModal(0);
                        } else {
                            alert('Connect to WiFi first');
                        }
                    };
                } else {
                    box.onclick = (e) => {
                        // Check if this is a filled box
                        if (box.classList.contains('filled')) {
                            openViewModal(i);
                        } else if (userPostBox === -1) {
                            openModal(i);
                        } else {
                            alert('You can only post once per WiFi network');
                        }
                    };
                }
                
                grid.appendChild(box);
            }
            
            // Load existing content for current WiFi
            if (isConnected && gridContent[currentWiFi]) {
                gridContent[currentWiFi].forEach(post => {
                    if (post.boxIndex >= 0) {
                        const box = document.getElementById(`box-${post.boxIndex}`);
                        if (box) {
                            if (post.boxIndex === 0) {
                                box.innerHTML = '<div style="text-align: center; line-height: 1.2;"><div style="font-size: 32px; margin-bottom: 4px;">+</div><div style="font-size: 11px; color: #999;">Add content to grid</div></div>';
                            } else {
                                box.innerHTML = `<div style="font-size: 13px; color: #fff; overflow: hidden; text-overflow: ellipsis; line-height: 1.4; text-align: left;">${post.content}</div>`;
                                box.classList.add('filled');
                                if (post.isUserPost) {
                                    userPostBox = post.boxIndex;
                                }
                            }
                        }
                    }
                });
            }
        }

        // View modal functions
        function openViewModal(boxIndex) {
            const post = gridContent[currentWiFi].find(p => p.boxIndex === boxIndex);
            if (!post) return;

            document.getElementById('viewText').textContent = post.content || '(No content)';
            
            // Show delete button only for user's own posts
            const deleteSection = document.getElementById('deleteSection');
            if (post.isUserPost) {
                deleteSection.style.display = 'block';
                selectedBoxIndex = boxIndex; // Store for delete function
            } else {
                deleteSection.style.display = 'none';
            }
            
            document.getElementById('viewModal').classList.add('active');
        }

        function closeViewModal() {
            document.getElementById('viewModal').classList.remove('active');
        }

        function deletePost() {
            if (selectedBoxIndex === -1) return;

            // Remove from gridContent
            gridContent[currentWiFi] = gridContent[currentWiFi].filter(
                p => p.boxIndex !== selectedBoxIndex
            );

            // Update grid display
            const box = document.getElementById(`box-${selectedBoxIndex}`);
            box.innerHTML = '';
            box.classList.remove('filled');

            userPostBox = -1; // User can post again
            closeViewModal();
        }

        // Modal functions
        function openModal(boxIndex) {
            if (!isConnected) {
                alert('Connect to WiFi first');
                return;
            }

            // Prevent posting if user already posted
            if (userPostBox !== -1) {
                alert('You can only post once per WiFi network');
                return;
            }

            // Don't allow editing filled boxes (except first box)
            if (boxIndex !== 0) {
                const box = document.getElementById(`box-${boxIndex}`);
                if (box.classList.contains('filled')) {
                    return;
                }
            }

            selectedBoxIndex = boxIndex;
            document.getElementById('uploadModal').classList.add('active');
            
            // Reset form
            document.getElementById('postText').value = '';
            document.getElementById('uploadArea').innerHTML = '<div class="upload-icon">📸</div><div class="upload-text">Drag photo, video, or post</div>';
            document.getElementById('fileInput').value = '';
            selectedFile = null;
        }

        function closeModal() {
            document.getElementById('uploadModal').classList.remove('active');
            selectedBoxIndex = -1;
            selectedFile = null;
        }

        // Click outside modals to close
        document.addEventListener('click', (e) => {
            const uploadModal = document.getElementById('uploadModal');
            const viewModal = document.getElementById('viewModal');
            if (e.target === uploadModal) {
                closeModal();
            }
            if (e.target === viewModal) {
                closeViewModal();
            }
        });

        // WiFi Connection
        async function connectToWiFi() {
            try {
                let wifiName = null;
                
                if (navigator.connection && navigator.connection.type) {
                    wifiName = 'Connected WiFi Network';
                }
                
                if (!wifiName) {
                    wifiName = 'WiFi Network ' + new Date().getTime().toString().slice(-4);
                }
                
                isConnected = true;
                currentWiFi = wifiName;
                
                if (!gridContent[currentWiFi]) {
                    gridContent[currentWiFi] = [];
                }
                
                document.getElementById('wifiStatus').style.display = 'none';
                document.getElementById('connectionInfo').style.display = 'block';
                document.getElementById('displayWiFiName').textContent = wifiName;
                document.getElementById('wifiInfo').classList.add('connected');
                document.getElementById('wifiName').textContent = wifiName;
                
                initializeGrid();
            } catch (error) {
                alert('Unable to connect to WiFi. Please try again.');
            }
        }

        function disconnectWiFi() {
            isConnected = false;
            currentWiFi = '';
            selectedFile = null;
            closeModal();
            closeViewModal();
            document.getElementById('wifiStatus').style.display = 'block';
            document.getElementById('connectionInfo').style.display = 'none';
            document.getElementById('wifiInfo').classList.remove('connected');
            initializeGrid();
        }

        // Upload handling
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');

        uploadArea.addEventListener('click', () => fileInput.click());

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            handleFiles(e.dataTransfer.files);
        });

        fileInput.addEventListener('change', (e) => {
            handleFiles(e.target.files);
        });

        function handleFiles(files) {
            if (files.length > 0) {
                selectedFile = files[0];
                const isVideo = files[0].type.startsWith('video');
                const isImage = files[0].type.startsWith('image');
                const icon = isVideo ? '🎬' : isImage ? '📸' : '📁';
                uploadArea.innerHTML = `<div style="text-align: center;"><div class="upload-icon">${icon}</div><div class="upload-text">${files[0].name.substring(0, 20)}...</div></div>`;
            }
        }

        function uploadPost() {
            if (!isConnected) {
                alert('Please connect to WiFi first');
                return;
            }

            if (userPostBox !== -1) {
                alert('You can only post once per WiFi network');
                return;
            }

            const postText = document.getElementById('postText').value;
            const hasFile = selectedFile !== null;

            if (!postText && !hasFile) {
                alert('Please add content');
                return;
            }

            // Use selected box or find first empty
            let boxIndex = selectedBoxIndex;
            if (boxIndex === -1 || boxIndex === 0) {
                for (let i = 1; i < gridSize; i++) {
                    const box = document.getElementById(`box-${i}`);
                    if (!box.classList.contains('filled')) {
                        boxIndex = i;
                        break;
                    }
                }
            }

            if (boxIndex === -1) {
                alert('Grid is full');
                return;
            }

            // Store in gridContent for this WiFi network
            const post = {
                boxIndex: boxIndex,
                content: postText,
                file: selectedFile,
                timestamp: new Date().getTime(),
                isUserPost: true
            };

            gridContent[currentWiFi].push(post);
            userPostBox = boxIndex;

            // Update grid display
            const box = document.getElementById(`box-${boxIndex}`);
            box.innerHTML = `<div style="font-size: 13px; color: #fff; overflow: hidden; text-overflow: ellipsis; line-height: 1.4; text-align: left;">${postText}</div>`;
            box.classList.add('filled');

            closeModal();
        }

        // Initialize on load
        initializeGrid();
    </script>
</body>
</html>
