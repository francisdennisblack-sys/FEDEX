<!DOCTYPE html>
<html>
<head>
    <title>WiFi Grid - Local Community</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0a0a0a;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            -webkit-overflow-scrolling: touch;
            touch-action: manipulation;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 30px;
            border-bottom: 1px solid #222;
            background-color: #0a0a0a;
            width: 90%;
            margin: 0 auto;
        }

        .logo {
            font-size: 28.8px;
            font-weight: 700;
            letter-spacing: -0.5px;
            -webkit-text-stroke: 1px white;
        }

        .wifi-info {
            display: none;
            text-align: center;
            font-size: 14px;
            color: #888;
        }

        .wifi-info.connected {
            display: block;
        }

        .wifi-name {
            font-size: 16px;
            color: #fff;
            margin-top: 4px;
        }

        .container {
            display: flex;
            height: calc(100vh - 80px);
            gap: 30px;
            padding: 30px;
            width: 90%;
            margin: 0 auto;
        }

        .grid-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .grid {
            display: none;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding-right: 10px;
            -webkit-overflow-scrolling: touch;
        }

        /* Tablet size optimization (600px+) - 3 columns */
        @media (min-width: 600px) {
            .grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 20px;
            }
        }

        /* Desktop size optimization (1200px+) - 4 columns */
        @media (min-width: 1200px) {
            .grid {
                grid-template-columns: repeat(4, 1fr);
                gap: 25px;
            }
        }

        .grid-box {
            aspect-ratio: 1;
            background-color: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: #fff;
            flex-direction: column;
            padding: 8px;
            overflow: hidden;
            position: relative;
        }

        .grid-box:hover {
            background-color: #222;
            border-color: #444;
        }

        .grid-box.filled {
            background-color: #1a1a1a;
            border-color: #555;
        }

        .upload-panel {
            width: 280px;
            background-color: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .upload-panel h3 {
            font-size: 16px;
            font-weight: 600;
        }

        .upload-area {
            border: 2px dashed #444;
            border-radius: 8px;
            padding: 24px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 8px;
        }

        .upload-area:hover {
            border-color: #666;
            background-color: #222;
        }

        .upload-area.dragover {
            border-color: #fff;
            background-color: #2a2a2a;
        }

        .upload-icon {
            font-size: 28px;
        }

        .upload-text {
            font-size: 12px;
            color: #888;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        @keyframes slideOut {
            from {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
            to {
                opacity: 0;
                transform: translateX(-50%) translateY(-10px);
            }
        }

        input[type="file"] {
            display: none;
        }

        .upload-buttons {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        button {
            padding: 12px 16px;
            background-color: #fff;
            color: #000;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        button:hover {
            background-color: #f0f0f0;
        }

        .secondary-btn {
            background-color: #333;
            color: #fff;
        }

        .secondary-btn:hover {
            background-color: #444;
        }

        .wifi-connect-btn {
            background-color: #333;
            color: #fff;
            width: 100%;
        }

        .wifi-connect-btn:hover {
            background-color: #444;
        }

        @media (max-width: 1024px) {
            .container {
                flex-direction: column;
                padding: 20px;
                gap: 20px;
            }

            .upload-panel {
                width: 100%;
                order: -1;
            }
        }

        .grid::-webkit-scrollbar {
            width: 6px;
        }

        .grid::-webkit-scrollbar-track {
            background: transparent;
        }

        .grid::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 3px;
        }

        .grid::-webkit-scrollbar-thumb:hover {
            background: #555;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background-color: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 32px;
            width: 90%;
            max-width: 400px;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .modal-header h2 {
            font-size: 18px;
        }

        .modal-close {
            background: none;
            border: none;
            color: #888;
            font-size: 24px;
            cursor: pointer;
            padding: 0;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-close:hover {
            color: #fff;
        }

        .modal .upload-area {
            margin-bottom: 16px;
        }

        .modal textarea {
            margin-bottom: 16px;
        }

        .modal .upload-buttons {
            margin-bottom: 0;
        }

        .view-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.9);
            z-index: 1001;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .view-modal.active {
            display: flex;
        }

        .view-modal-content {
            background-color: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 48px;
            width: 95%;
            max-width: 800px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .view-modal-close {
            background: none;
            border: none;
            color: #888;
            font-size: 24px;
            cursor: pointer;
            padding: 0;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-left: auto;
            margin-bottom: 24px;
        }

        .view-modal-close:hover {
            color: #fff;
        }

        .admin-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            z-index: 5000;
            align-items: center;
            justify-content: center;
        }

        .admin-modal.active {
            display: flex;
        }

        .admin-modal-content {
            background-color: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 30px;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .admin-page {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #0a0a0a;
            z-index: 5001;
            flex-direction: column;
        }

        .admin-page.active {
            display: flex;
        }

        .admin-header {
            padding: 20px 30px;
            border-bottom: 1px solid #222;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .admin-content {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
        }

        .view-content-icon {
            font-size: 80px;
            margin-bottom: 32px;
        }

        .view-content-text {
            font-size: 26px;
            line-height: 1.8;
            word-break: break-word;
            color: #fff;
        }
    </style>
</head>

<body>
    <div class="header">

    <input type="file" id="fileInput" accept="image/*,video/*">

    <div class="modal" id="uploadModal">

                <h2>Add to Grid</h2>
                <button class="modal-close" onclick="closeModal()">×</button>

            <div class="upload-area" id="uploadArea">

            <textarea id="postText" placeholder="Write something..." style="

    <div class="view-modal" id="viewModal">
        <div class="view-modal-content">
            <button class="view-modal-close" onclick="closeViewModal()">×</button>
            <div class="view-content-text" id="viewText"></div>
            
            <div style="display: flex; gap: 12px; margin-top: 24px; align-items: center; justify-content: space-between; padding-top: 24px; border-top: 1px solid #333;">
                <div style="display: flex; gap: 12px;">
                    <button id="likeBtn" onclick="toggleLike()" style="

                    " onmouseover="this.style.backgroundColor='#444'" onmouseout="this.style.backgroundColor='#333'">↑ <span id="likeCount">0</span></button>
                    
                    <button id="dislikeBtn" onclick="toggleDislike()" style="
                        padding: 8px 12px;
                        background-color: #333;
                        color: #fff;
                        border: none;
                        border-radius: 6px;
                        font-size: 12px;
                        cursor: pointer;
                        transition: all 0.2s ease;
                    " onmouseover="this.style.backgroundColor='#444'" onmouseout="this.style.backgroundColor='#333'">↓ <span id="dislikeCount">0</span></button>
                </div>
                
                <button id="shareBtn" onclick="sharePost()" style="

            <div style="margin-top: 16px;">
                <button onclick="hidePost()" style="

                    padding: 12px 16px;
                    background-color: #666;
                    color: white;

    <!-- Password Modal -->
    <div class="admin-modal" id="passwordModal">
        <div class="admin-modal-content">
            <h2 style="margin-bottom: 20px;">Admin Access</h2>

            <button onclick="closeAdminPage()" style="

            <h2 style="margin-bottom: 20px;">Welcome Admin</h2>
            <p style="color: #888;">Admin features coming soon...</p>

    <script type="module">
        console.log('📦 Firebase module loading...');
        // Import Firebase functions
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js';
        import { getDatabase, ref, set, get, update, remove, onValue } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js';
        import { getStorage, ref as storageRef, uploadBytes, getDownloadURL, deleteObject } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-storage.js';

        const firebaseConfig = {
            apiKey: "AIzaSyD5A_MF7gRvqnHd_DD3lReYpEkRph6msX4",
            authDomain: "wificontent-143da.firebaseapp.com",
            databaseURL: "https://wificontent-143da-default-rtdb.firebaseio.com",
            projectId: "wificontent-143da",
            storageBucket: "wificontent-143da.firebasestorage.app",
            messagingSenderId: "158237266758",
            appId: "1:158237266758:web:56c5796ce9b9e6e31f0b47"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);
        const storage = getStorage(app);
        
        console.log('✅ Firebase initialized');
        console.log('  app:', app);
        console.log('  database:', database);
        console.log('  storage:', storage);

        const initialGridSize = 12; // Start with 12 squares visible
        let maxGridSize = 12; // Dynamically expand this
        let isConnected = false;
        let currentWiFi = '';
        let gridContent = {};
        let selectedFile = null;
        let selectedBoxIndex = -1;
        let userPostBoxes = []; // Array to track up to 5 user posts
        let userVotes = {};
        let hiddenPosts = {};
        let selectedPostId = null;
        let adminLongPressTimer = null;
        let refreshInterval = null;
        let firebaseUnsubscribe = null;
        let isLoadingMore = false;
        
        // Determine API URL - only used for WiFi network detection
        // All photos and posts are stored in Firebase (Realtime Database + Cloud Storage)
        const apiUrl = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' 
            ? 'http://localhost:5001' 
            : 'https://fedex-backend.vercel.app'; // Production backend URL for WiFi detection only

        // Firebase Database Functions
        async function savePostToFirebase(networkId, postId, postData) {
            try {
                console.log('🔥 SAVING POST TO FIREBASE');
                console.log('  networkId:', networkId);
                console.log('  postId:', postId);
                console.log('  postData:', postData);
                console.log('  database object:', database);
                
                if (!database) {
                    throw new Error('Database not initialized!');
                }
                
                const postRef = ref(database, `networks/${networkId}/posts/${postId}`);
                console.log('  📍 Reference path created:', `networks/${networkId}/posts/${postId}`);
                console.log('  postRef object:', postRef);
                
                console.log('  ⏳ Calling set() to save to Firebase...');
                await set(postRef, postData);
                console.log('✅ POST SAVED SUCCESSFULLY');
                return { success: true, postId };
            } catch (error) {
                console.error('❌ ERROR SAVING POST:', error.message);
                console.error('  Error code:', error.code);
                console.error('  Full error:', error);
                console.error('  Error stack:', error.stack);
                throw error;
            }
        }

        async function uploadPhotoToFirebase(networkId, postId, file) {
            try {
                const photoPath = `networks/${networkId}/photos/${postId}`;
                console.log('🔥 STARTING PHOTO UPLOAD TO STORAGE');
                console.log('  Network ID:', networkId);
                console.log('  Post ID:', postId);
                console.log('  Storage path:', photoPath);
                console.log('  File details:', { name: file.name, size: file.size, type: file.type });
                
                const photoRef = storageRef(storage, photoPath);
                console.log('  Storage reference created');
                
                const snapshot = await uploadBytes(photoRef, file);
                console.log('✅ File uploaded to Storage');
                
                const downloadURL = await getDownloadURL(snapshot.ref);
                console.log('✅ PHOTO URL OBTAINED:', downloadURL);
                
                return downloadURL;
            } catch (error) {
                console.error('❌ ERROR UPLOADING PHOTO:', error.message);
                console.error('  Error code:', error.code);
                console.error('  Full error:', error);

                console.error('Error message:', error.message);
                throw error;
            }
        }

        async function getPostsFromFirebase(networkId) {
            try {
                const postsRef = ref(database, `networks/${networkId}/posts`);
                const snapshot = await get(postsRef);
                
                if (snapshot.exists()) {
                    const postsObj = snapshot.val();
                    return Object.keys(postsObj).map(key => ({
                        id: key,
                        ...postsObj[key]
                    }));
                }
                return [];
            } catch (error) {
                console.error('Error getting posts from Firebase:', error);
                return [];
            }
        }

        function subscribeToFirebasePosts(networkId, callback) {
            try {
                const postsRef = ref(database, `networks/${networkId}/posts`);
                
                const unsubscribe = onValue(postsRef, (snapshot) => {
                    if (snapshot.exists()) {
                        const postsObj = snapshot.val();
                        const posts = Object.keys(postsObj).map(key => ({
                            id: key,
                            ...postsObj[key]
                        }));
                        callback(posts);
                    } else {
                        callback([]);
                    }
                }, (error) => {
                    console.error('Firebase listener error:', error);
                });
                
                return unsubscribe;
            } catch (error) {
                console.error('Error subscribing to Firebase posts:', error);
                return () => {};
            }
        }

        async function deletePostFromFirebase(networkId, postId) {
            try {
                const postRef = ref(database, `networks/${networkId}/posts/${postId}`);
                await remove(postRef);
                console.log('Post deleted from Firebase:', postId);
            } catch (error) {
                console.error('Error deleting post:', error);
            }
        }

        async function updatePostVotesFirebase(networkId, postId, updates) {
            try {
                const postRef = ref(database, `networks/${networkId}/posts/${postId}`);
                await update(postRef, updates);
                console.log('Votes updated:', postId);
            } catch (error) {
                console.error('Error updating votes:', error);
            }
        }

        // Detect WiFi network
        async function detectWiFiNetwork() {
            try {
                // Generate or retrieve unique device ID for this browser/device
                let deviceId = localStorage.getItem('wifiGridDeviceId');
                
                if (!deviceId) {
                    // First time visitor - generate new device ID
                    deviceId = generateDeviceId();
                    localStorage.setItem('wifiGridDeviceId', deviceId);
                    console.log('New device ID generated:', deviceId);
                } else {
                    console.log('Existing device ID retrieved:', deviceId);
                }

            const currentVote = userVotes[voteKey];

        // Smart video processing: trim to 20s max and compress intelligently
        async function processVideo(file) {
            return new Promise((resolve) => {
                const MAX_VIDEO_DURATION = 20; // seconds
                const MAX_VIDEO_SIZE = 100 * 1024 * 1024; // 100MB
                const QUALITY_LEVELS = [
                    { name: 'High', videoBitrate: 2500, audioBitrate: 128 },
                    { name: 'Medium', videoBitrate: 1500, audioBitrate: 96 },
                    { name: 'Low', videoBitrate: 800, audioBitrate: 64 },
                    { name: 'Very Low', videoBitrate: 400, audioBitrate: 32 }
                ];
                
                const video = document.createElement('video');
                video.src = URL.createObjectURL(file);
                
                video.onloadedmetadata = () => {
                    const videoDuration = Math.min(video.duration, MAX_VIDEO_DURATION);
                    console.log(`Video loaded: ${Math.ceil(video.duration)}s duration, will trim to ${Math.ceil(videoDuration)}s`);
                    
                    // Try compression at each quality level
                    let qualityIndex = 0;
                    
                    const tryCompress = () => {
                        if (qualityIndex >= QUALITY_LEVELS.length) {
                            alert('Unable to compress video enough. Please choose a shorter or smaller video.');
                            resolve(null);
                            return;
                        }
                        
                        const quality = QUALITY_LEVELS[qualityIndex];
                        console.log(`Attempting compression at ${quality.name} quality...`);
                        
                        compressVideoAtQuality(video, videoDuration, quality, (processedBlob) => {
                            if (processedBlob && processedBlob.size <= MAX_VIDEO_SIZE) {
                                console.log(`✓ Compression successful at ${quality.name} quality: ${(processedBlob.size / 1024 / 1024).toFixed(1)}MB`);
                                resolve(processedBlob);
                            } else if (processedBlob) {
                                console.log(`✗ ${quality.name} quality too large: ${(processedBlob.size / 1024 / 1024).toFixed(1)}MB, trying lower quality...`);
                                qualityIndex++;
                                tryCompress();
                            } else {
                                qualityIndex++;
                                tryCompress();
                            }
                        });
                    };
                    
                    tryCompress();
                };
                
                video.onerror = () => {
                    alert('Could not process video. Make sure it\'s a valid video file.');
                    resolve(null);
                };
            });
        }
        
        // Compress video at specific quality level
        function compressVideoAtQuality(videoElement, duration, quality, callback) {
            const canvas = document.createElement('canvas');
            const video = videoElement;
            const ctx = canvas.getContext('2d');
            
            // Use lower resolution for lower quality
            const qualityMultiplier = {
                'High': 1.0,
                'Medium': 0.8,
                'Low': 0.6,
                'Very Low': 0.4
            }[quality.name] || 0.6;
            
            canvas.width = video.videoWidth * qualityMultiplier;
            canvas.height = video.videoHeight * qualityMultiplier;
            
            const chunks = [];
            let startTime = null;
            let frameCount = 0;
            
            // MediaRecorder for re-encoding
            const stream = canvas.captureStream(30); // 30 fps
            
            // Try to get audio track if available
            if (video.currentTime === 0) {
                video.currentTime = 0;
            }
            
            const mimeType = 'video/webm;codecs=vp8,opus';
            const options = {
                mimeType: mimeType,
                videoBitsPerSecond: quality.videoBitrate * 1000
            };
            
            try {
                const mediaRecorder = new MediaRecorder(stream, options);
                
                mediaRecorder.ondataavailable = (e) => {
                    chunks.push(e.data);
                };
                
                mediaRecorder.onerror = (e) => {
                    console.error('MediaRecorder error:', e.error);
                    callback(null);
                };
                
                mediaRecorder.onstop = () => {
                    const blob = new Blob(chunks, { type: 'video/webm' });
                    callback(blob);
                };
                
                mediaRecorder.start();
                startTime = performance.now();
                
                // Draw frames from video
                const drawFrame = () => {
                    const currentTime = (performance.now() - startTime) / 1000;
                    
                    if (currentTime >= duration) {
                        mediaRecorder.stop();
                        return;
                    }
                    
                    video.currentTime = currentTime;
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    frameCount++;
                    
                    requestAnimationFrame(drawFrame);
                };
                
                drawFrame();
            } catch (e) {
                console.error('MediaRecorder not supported:', e);
                callback(null);
            }
        }

        function handleFiles(files) {
            if (!isConnected) {
                alert('WiFi connection required to upload');
                return;
            }
            if (files.length > 0) {
                const file = files[0];
                const isVideo = file.type.startsWith('video');
                const isImage = file.type.startsWith('image');
                
                // Process video before accepting
                if (isVideo) {
                    uploadArea.innerHTML = `<div style="text-align: center;"><div class="upload-icon">⏳</div><div class="upload-text">Processing video...</div></div>`;
                    
                    processVideo(file).then((processedBlob) => {
                        if (processedBlob) {
                            selectedFile = processedBlob;
                            const originalSize = (file.size / 1024 / 1024).toFixed(1);
                            const newSize = (processedBlob.size / 1024 / 1024).toFixed(1);
                            const compression = ((1 - processedBlob.size / file.size) * 100).toFixed(0);
                            uploadArea.innerHTML = `<div style="text-align: center;"><div class="upload-icon">🎬</div><div class="upload-text">Video Ready</div><div style="font-size: 10px; color: #888; margin-top: 4px;">${newSize}MB (${compression}% compressed)</div></div>`;
                            console.log(`Video processed and ready: original ${originalSize}MB → ${newSize}MB`);
                        } else {
                            selectedFile = null;
                            uploadArea.innerHTML = '<div class="upload-icon">📸</div><div class="upload-text">Drag photo, video, or post</div>';
                            fileInput.value = '';
                        }
                    });
                    return;
                }
                
                // For images and other files
                selectedFile = file;
                const icon = isImage ? '📸' : '📁';
                
                // Create preview for images
                if (isImage) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        uploadArea.innerHTML = `<img src="${e.target.result}" style="max-width: 100%; max-height: 150px; border-radius: 6px; object-fit: contain;">`;
                    };
                    reader.readAsDataURL(file);
                } else {
                    uploadArea.innerHTML = `<div style="text-align: center;"><div class="upload-icon">${icon}</div><div class="upload-text">${file.name.substring(0, 20)}...</div></div>`;
                }
            }
        }

        function uploadPost() {
            if (!isConnected) {
                alert('Please connect to WiFi first');
                return;
            }

            if (userPostBoxes.length >= 5) {
                alert('You can post up to 5 times per WiFi network');
                return;
            }

            const postText = document.getElementById('postText').value;
            const hasFile = selectedFile !== null;

            if (!postText && !hasFile) {
                alert('Please add content');
                return;
            }

            // Use selected box or find first empty
            let boxIndex = selectedBoxIndex;
            if (boxIndex === -1 || boxIndex === 0) {
                for (let i = 1; i < gridSize; i++) {
                    const box = document.getElementById(`box-${i}`);
                    if (!box.classList.contains('filled')) {
                        boxIndex = i;
                        break;
                    }
                }
            }

            if (boxIndex === -1) {
                alert('Grid is full');
                return;
            }

            // Pass File object directly to completeUpload (Firebase will handle it)
            // selectedFile is already a File object from the input
            completeUpload(boxIndex, selectedFile);
        }

        async function completeUpload(boxIndex, imageFile) {
            const postText = document.getElementById('postText').value;
            const postId = `post_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`;
            
            try {
                console.log('=== Starting post creation ===');
                console.log('Network ID (currentWiFi):', currentWiFi);
                console.log('Network ID type:', typeof currentWiFi);
                console.log('Network ID length:', currentWiFi ? currentWiFi.length : 0);
                console.log('Is connected:', isConnected);
                console.log('Post ID:', postId);
                console.log('Has photo:', !!imageFile);
                
                // VALIDATION: Check if we have a valid network ID
                if (!currentWiFi || currentWiFi.trim() === '') {
                    throw new Error('No WiFi network detected! currentWiFi is empty or undefined.');
                }
                
                let photoURL = null;

                // Upload photo to Firebase Storage if provided
                if (imageFile) {
                    console.log('Uploading photo to Firebase Storage...');
                    try {
                        photoURL = await uploadPhotoToFirebase(currentWiFi, postId, imageFile);
                        console.log('Photo upload complete. URL:', photoURL);
                    } catch (photoError) {
                        console.error('Photo upload FAILED:', photoError);
                        alert('Photo upload failed: ' + photoError.message);
                        throw photoError;
                    }
                }

                // Create post data object
                const postData = {
                    id: postId,
                    networkId: currentWiFi,
                    content: postText,
                    photoURL: photoURL,
                    timestamp: new Date().getTime(),
                    likes: 0,
                    dislikes: 0,
                    isUserPost: true
                };

                console.log('Post data prepared:', postData);

                // Save post to Firebase Realtime Database ONLY
                console.log('🔥 ABOUT TO SAVE POST TO FIREBASE');
                console.log('  currentWiFi:', currentWiFi);
                console.log('  postId:', postId);
                await savePostToFirebase(currentWiFi, postId, postData);

                // DO NOT update local grid - let Firebase listener handle it
                // The listener will fire when post appears in Firebase
                if (!userPostBoxes.includes(boxIndex)) {
                    userPostBoxes.push(boxIndex);
                }

                // Close modal and show notification
                closeModal();
                showNotification('Post published successfully!');
                console.log('=== Post creation complete - waiting for Firebase listener ===');
                
            } catch (error) {
                console.error('=== Failed to upload post ===', error);
                console.error('Error stack:', error.stack);
                alert('Failed to publish post: ' + error.message);
            }
        }

        // Auto-initialize on page load
        document.addEventListener('DOMContentLoaded', () => {
            console.log('Page loaded, initializing WiFi grid...');
            initializeGrid();
            checkWiFiOnLoad();
        });
        // Also try to connect immediately in case DOMContentLoaded already fired
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', checkWiFiOnLoad);
        } else {
            setTimeout(checkWiFiOnLoad, 100);
        }

        // CRITICAL: Expose functions to global scope so onclick handlers can access them
        // (module scope normally hides these from HTML onclick attributes)
        window.uploadPost = uploadPost;
        window.closeModal = closeModal;
        window.toggleLike = toggleLike;
        window.toggleDislike = toggleDislike;
        window.sharePost = sharePost;
        window.deletePost = deletePost;
        window.hidePost = hidePost;
        window.closeViewModal = closeViewModal;
        window.testDisconnectReconnect = testDisconnectReconnect;
        window.testReconnect = testReconnect;
        window.checkPassword = checkPassword;
        window.closePasswordModal = closePasswordModal;
        window.closeAdminPage = closeAdminPage;
        window.startAdminLongPress = startAdminLongPress;
        window.stopAdminLongPress = stopAdminLongPress;
        
        console.log('✅ All functions exposed to global window scope');

    </script>
</html>
